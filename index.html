<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PREDICADOR-PRO | Acceso Ministerial</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --dark-bg: #121212;
            --card-bg: #1e1e1e;
            --text-main: #f0f0f0;
            --parchment: #f4ecd8;
        }
        body { 
            font-family: 'Georgia', serif; 
            background-color: var(--dark-bg); 
            color: var(--text-main); 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
        }
        .app-card {
            background: var(--card-bg);
            width: 95%;
            max-width: 500px;
            padding: 50px 40px;
            border-radius: 8px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            border-top: 5px solid var(--gold);
            text-align: center;
            position: relative;
        }
        h1 { 
            color: var(--gold); 
            letter-spacing: 4px; 
            margin: 0 0 10px 0; 
            font-size: 30px;
            text-transform: uppercase;
        }
        .subtitle { 
            font-style: italic; 
            color: #777; 
            font-size: 14px; 
            margin-bottom: 40px;
            letter-spacing: 3px;
        }
        .input-group { margin-bottom: 25px; text-align: left; }
        label { 
            display: block; 
            color: var(--gold); 
            margin-bottom: 12px; 
            font-size: 12px; 
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
        }
        input, textarea {
            width: 100%;
            padding: 18px;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
            font-family: 'Georgia', serif;
        }
        input:focus, textarea:focus { border-color: var(--gold); outline: none; }
        
        button {
            width: 100%;
            padding: 20px;
            background: var(--gold);
            color: black;
            border: none;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 14px;
            transition: 0.3s;
        }
        button:hover { background: #fff; transform: translateY(-2px); }
        
        #main-app { display: none; margin-top: 30px; }
        .footer-info { margin-top: 50px; font-size: 11px; color: #444; text-transform: uppercase; letter-spacing: 1px; }
        
        .top-icons { position: absolute; top: 20px; right: 25px; color: var(--gold); }
        .top-icons i { cursor: pointer; font-size: 20px; opacity: 0.7; }

        /* MODO PERGAMINO */
        .light-mode { background-color: #2c2c2c; }
        .light-mode .app-card { background: var(--parchment); color: #1a1a1a; border-top: 5px solid #8b4513; }
        .light-mode h1, .light-mode label { color: #8b4513; }
        .light-mode input, .light-mode textarea { background: #fff; color: #000; border: 1px solid #d3c4a8; }
        .light-mode button { background: #8b4513; color: #fff; }
    </style>
</head>
<body>

<div class="app-card">
    <div class="top-icons">
        <i class="fas fa-sun" onclick="toggleTheme()" title="Cambiar Modo"></i>
    </div>
    
    <h1>PREDICADOR-PRO</h1>
    <div class="subtitle">SOLI DEO GLORIA</div>

    <div id="auth-box">
        <div class="input-group">
            <label>Código de Autorización Ministerial</label>
            <input type="text" id="license-key" placeholder="INGRESE SU CLAVE">
        </div>
        <button onclick="verificarLicencia()">Activar Plataforma</button>
    </div>

    <div id="main-app">
        <div class="input-group">
            <label>Idea Homilética o Texto Bíblico</label>
            <textarea id="user-input" rows="5" placeholder="Escribe o dicta aquí..."></textarea>
        </div>
        <button onclick="enviarConsulta()">Generar Bosquejo Exegético</button>
        <button onclick="startSpeech()" style="background: transparent; color: var(--gold); border: 1px solid var(--gold); margin-top: 15px;">
            <i class="fas fa-microphone"></i> Dictar por Voz
        </button>
        <p id="status-msg" style="font-size: 13px; margin-top: 20px; color: var(--gold); font-style: italic;"></p>
    </div>

    <div class="footer-info">
        Administración: Jorge Álvarez<br>Villa Elisa, Paraguay | 2026
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBf9xenhC3kO4vhO8EJMDnVAYm7L-S_jRU",
        authDomain: "predicador-pro.firebaseapp.com",
        projectId: "predicador-pro",
        storageBucket: "predicador-pro.appspot.com",
        messagingSenderId: "54203135548",
        appId: "1:54203135548:web:7f3b832b85a3637e96b8c8"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function verificarLicencia() {
        const key = document.getElementById('license-key').value.trim().toUpperCase();
        if(!key) return;
        const docRef = db.collection("artifacts/predicador-pro-default/public/data/licenses").doc(key);
        const doc = await docRef.get();
        if (doc.exists && doc.data().active === true) {
            document.getElementById('auth-box').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('status-msg').innerText = "Bienvenido. Motor de conocimiento activo.";
        } else {
            alert("Código no válido.");
        }
    }

    function toggleTheme() { document.body.classList.toggle('light-mode'); }

    function startSpeech() {
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = 'es-PY';
        rec.start();
        rec.onresult = (e) => { document.getElementById('user-input').value = e.results[0][0].transcript; };
    }

    async function enviarConsulta() {
        document.getElementById('status-msg').innerText = "Analizando bajo la lente de Berkhof...";
        setTimeout(() => { alert("Bosquejo generado con éxito."); }, 1200);
    }
</script>
</body>
</html>
