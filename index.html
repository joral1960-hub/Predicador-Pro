<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PREDICADOR-PRO - Plataforma de Homilética Profesional</title>
    <!-- Frameworks y Librerías -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase SaaS Integration -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
        
        // =========================================================
        // JORGE: PEGA AQUÍ TUS DATOS DE FIREBASE (Configuración del proyecto)
        // =========================================================
        const myFirebaseConfig = {
          apiKey: "TU_API_KEY_AQUI",
          authDomain: "TU_PROYECTO.firebaseapp.com",
          projectId: "TU_PROYECTO_ID",
          storageBucket: "TU_PROYECTO.appspot.com",
          messagingSenderId: "TU_SENDER_ID",
          appId: "TU_APP_ID"
        };

        // Si estamos en GitHub, usamos tu config. Si estamos en el editor, usa la del entorno.
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : myFirebaseConfig;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'predicador-pro-default';
        
        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.auth = getAuth(app);
        window.app_id = appId;
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,700&family=Crimson+Pro:wght@400;600&display=swap');
        
        body { font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; transition: all 0.5s ease; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #84cc16; border-radius: 10px; }

        .theological-paper { font-family: 'Crimson Pro', serif; font-size: 1.2rem; line-height: 1.8; }
        .theological-paper h2 { font-family: 'Playfair Display', serif; font-size: 1.8rem; margin: 1.5rem 0 1rem; color: #84cc16; border-bottom: 2px solid rgba(132, 204, 22, 0.2); display: inline-block; }
        .theological-paper h3 { font-family: 'Inter', sans-serif; font-weight: 800; margin-top: 1.5rem; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 0.15em; opacity: 0.7; }
        .theological-paper strong { color: #bef264; font-weight: 700; }
        .light-mode .theological-paper strong { color: #4d7c0f; }

        .message-in { animation: slideUp 0.5s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .glass-effect { backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }

        .badge-pro { background: linear-gradient(90deg, #84cc16 0%, #bef264 100%); color: #000; font-size: 10px; padding: 2px 10px; border-radius: 99px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }
        .emblem-container { position: relative; display: flex; align-items: center; justify-content: center; }
        .emblem-ring { position: absolute; border: 1px solid currentColor; border-radius: 50%; opacity: 0.15; animation: rotate-slow 30s linear infinite; }
        @keyframes rotate-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SYSTEM_PROMPT = `Eres el Asistente Teológico Reformado de Jorge Álvarez (PREDICADOR-PRO).
        MARCO: Biblia (Inerrante), Confesión de Londres de 1689. Al final incluye "## Profundizando en el Estudio".`;

        const Icon = ({ name, className }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const FormattedResponse = ({ text }) => {
            const lines = text.split('\n');
            return (
                <div className="theological-paper">
                    {lines.map((line, i) => (
                        <p key={i} className="mb-4">{line}</p>
                    ))}
                </div>
            );
        };

        const App = () => {
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [licenseCode, setLicenseCode] = useState(localStorage.getItem('predicador_license') || '');
            const [activeKey, setActiveKey] = useState(null);
            const [isLicenseValid, setIsLicenseValid] = useState(false);
            const [showSettings, setShowSettings] = useState(!localStorage.getItem('predicador_license'));

            const validateLicense = async (code) => {
                if (!code) return;
                try {
                    const { signInAnonymously } = await import("https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js");
                    const { doc, getDoc } = await import("https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js");
                    
                    await signInAnonymously(window.auth);
                    
                    const licenseRef = doc(window.db, 'artifacts', window.app_id, 'public', 'data', 'licenses', code.trim().toUpperCase());
                    const licenseSnap = await getDoc(licenseRef);
                    
                    if (licenseSnap.exists() && licenseSnap.data().active === true) {
                        setActiveKey(licenseSnap.data().apiKey);
                        setIsLicenseValid(true);
                        localStorage.setItem('predicador_license', code.trim().toUpperCase());
                        setShowSettings(false);
                    } else {
                        alert("Licencia no válida o inactiva.");
                    }
                } catch (err) {
                    alert("Error de servidor. Verifique su configuración de Firebase.");
                    console.error(err);
                }
            };

            useEffect(() => { if (licenseCode) validateLicense(licenseCode); }, []);

            const handleSend = async () => {
                if (!input.trim() || isLoading || !isLicenseValid) return;
                const userMsg = { role: 'user', content: input };
                const newHistory = [...messages, userMsg];
                setMessages(newHistory);
                setInput('');
                setIsLoading(true);
                try {
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${activeKey}`;
                    const res = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ role: 'user', parts: [{ text: SYSTEM_PROMPT + "\n" + input }] }]
                        })
                    });
                    const data = await res.json();
                    setMessages([...newHistory, { role: 'assistant', content: data.candidates[0].content.parts[0].text }]);
                } catch (err) { alert("Error en el motor de IA."); } finally { setIsLoading(false); }
            };

            const isDark = true;

            return (
                <div className="flex flex-col h-screen max-w-5xl mx-auto border-x bg-[#0f0f12] text-slate-200">
                    <header className="flex items-center justify-between px-8 py-6 border-b bg-[#1a1a20]/80 glass-effect">
                        <div className="flex items-center gap-5">
                            <div className="p-3 rounded-2xl bg-lime-500/10 text-lime-400 border border-lime-500/20"><Icon name="shield" className="w-6 h-6" /></div>
                            <div>
                                <h1 className="text-xl font-bold tracking-tight">PREDICADOR-PRO</h1>
                                <span className="badge-pro">{isLicenseValid ? 'PRO' : 'LOCK'}</span>
                            </div>
                        </div>
                    </header>

                    <main className="flex-1 overflow-y-auto p-16 space-y-12">
                        {messages.length === 0 && (
                            <div className="flex flex-col items-center justify-center h-full text-center space-y-10">
                                <Icon name="book-marked" className="w-32 h-32 opacity-20 text-lime-500" />
                                <h2 className="text-5xl font-extrabold tracking-tighter italic">Estudio Teológico</h2>
                            </div>
                        )}
                        {messages.map((msg, i) => (
                            <div key={i} className={`flex flex-col ${msg.role === 'user' ? 'items-end' : 'items-start'}`}>
                                <div className={`p-8 rounded-[2.5rem] max-w-[90%] border ${msg.role === 'user' ? 'bg-blue-600 border-blue-500 text-white' : 'bg-[#1a1a20] border-slate-800'}`}>
                                    <FormattedResponse text={msg.content} />
                                </div>
                            </div>
                        ))}
                    </main>

                    <footer className="p-8 border-t bg-[#1a1a20]">
                        <div className="flex gap-4">
                            <textarea
                                value={input}
                                onChange={(e) => setInput(e.target.value)}
                                placeholder="Escribe tu consulta bíblica..."
                                disabled={!isLicenseValid}
                                className="w-full bg-[#0b0b0d] border border-slate-700 rounded-[2rem] px-8 py-6 outline-none focus:ring-2 focus:ring-lime-500"
                                rows="1"
                            />
                            <button onClick={handleSend} className="p-7 rounded-[2rem] bg-lime-500 text-black"><Icon name="send" className="w-7 h-7" /></button>
                        </div>
                    </footer>

                    {showSettings && (
                        <div className="fixed inset-0 bg-black/98 flex items-center justify-center p-4 z-50">
                            <div className="p-16 rounded-[4rem] border border-slate-800 bg-[#1a1a20] text-center space-y-12">
                                <Icon name="shield-check" className="w-24 h-24 mx-auto text-lime-500" />
                                <h3 className="text-4xl font-black uppercase">Mi Suscripción</h3>
                                <input 
                                    type="text" 
                                    value={licenseCode} 
                                    onChange={(e) => setLicenseCode(e.target.value)}
                                    placeholder="CÓDIGO DE ACCESO..."
                                    className="w-full border p-8 rounded-[2rem] text-center bg-[#0b0b0d] border-slate-700 text-white"
                                />
                                <button onClick={() => validateLicense(licenseCode)} className="w-full bg-lime-500 text-black py-6 rounded-[2.5rem] font-bold">Activar Suscripción</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
