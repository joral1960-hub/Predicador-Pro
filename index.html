<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PREDICADOR-PRO | Homilética Profesional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
        
        const myFirebaseConfig = {
          apiKey: "AIzaSyC3tAC8y7E1SfnTWi08fwq7gMXP_mnmpfw", 
          authDomain: "predicador-pro.firebaseapp.com",
          projectId: "predicador-pro",
          storageBucket: "predicador-pro.firebasestorage.app",
          messagingSenderId: "145970938733",
          appId: "1:145970938733:web:357aa4d0523d2892891064"
        };

        const app = initializeApp(myFirebaseConfig);
        window.PredicadorDB = {
            db: getFirestore(app),
            auth: getAuth(app),
            doc, getDoc, signInAnonymously,
            appId: 'predicador-pro-default',
            ready: true
        };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Crimson+Pro:wght@400;600&display=swap');
        body { font-family: 'Inter', sans-serif; transition: 0.3s; }
        .dark { background-color: #0f0f12; color: #f8fafc; }
        .light { background-color: #f1f5f9; color: #1e293b; }
        .theological-paper { font-family: 'Crimson Pro', serif; font-size: 1.2rem; line-height: 1.7; }
        .glass { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .dark .card { background-color: #1a1a20; border-color: #334155; }
        .light .card { background-color: #ffffff; border-color: #e2e8f0; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body id="app-body" class="dark">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const SYSTEM_PROMPT = "Eres PREDICADOR-PRO, un erudito teológico reformado. Responde con profundidad exegética basada en la Confesión de 1689.";

        const App = () => {
            const [isLicenseValid, setIsLicenseValid] = useState(false);
            const [licenseCode, setLicenseCode] = useState(localStorage.getItem('predicador_license') || '');
            const [activeKey, setActiveKey] = useState(null);
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [theme, setTheme] = useState('dark');

            const toggleTheme = () => {
                const newTheme = theme === 'dark' ? 'light' : 'dark';
                setTheme(newTheme);
                document.getElementById('app-body').className = newTheme;
            };

            const validateLicense = async (code) => {
                if (!code) return;
                try {
                    await window.PredicadorDB.signInAnonymously(window.PredicadorDB.auth);
                    const { db, appId, doc, getDoc } = window.PredicadorDB;
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'licenses', code.trim().toUpperCase());
                    const snap = await getDoc(docRef);
                    if (snap.exists() && snap.data().active) {
                        const key = snap.data().apiKey || snap.data().apikey;
                        setActiveKey(key);
                        setIsLicenseValid(true);
                        localStorage.setItem('predicador_license', code.toUpperCase());
                    } else { alert("Licencia Inválida"); localStorage.removeItem('predicador_license'); }
                } catch (e) { console.error(e); }
            };

            useEffect(() => { if (licenseCode) validateLicense(licenseCode); }, []);

            const handleSend = async () => {
                if (!input.trim() || !activeKey) return;
                const newMsg = { role: 'user', content: input };
                setMessages([...messages, newMsg]);
                setInput('');
                setIsLoading(true);

                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${activeKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: SYSTEM_PROMPT + "\n\nConsulta: " + input }] }] })
                    });
                    const data = await res.json();
                    const responseText = data.candidates[0].content.parts[0].text;
                    setMessages(prev => [...prev, { role: 'assistant', content: responseText }]);
                } catch (err) {
                    setMessages(prev => [...prev, { role: 'assistant', content: "Error de conexión. Verifique su llave API en Firebase." }]);
                } finally { setIsLoading(false); }
            };

            if (!isLicenseValid) {
                return (
                    <div className="flex items-center justify-center h-screen p-6">
                        <div className="card max-w-md w-full p-10 rounded-[2rem] border text-center shadow-2xl bg-[#16161a]">
                            <i className="fas fa-lock text-4xl text-lime-500 mb-6"></i>
                            <h2 className="text-xl font-bold mb-6 uppercase tracking-widest text-white">Acceso Ministerial</h2>
                            <input type="text" value={licenseCode} onChange={(e) => setLicenseCode(e.target.value)} placeholder="CÓDIGO" className="w-full bg-black border border-slate-700 rounded-xl p-4 text-center text-white mb-4 outline-none focus:border-lime-500" />
                            <button onClick={() => validateLicense(licenseCode)} className="w-full bg-lime-500 text-black font-bold py-4 rounded-xl hover:bg-lime-400 uppercase">Activar</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex flex-col h-screen max-w-4xl mx-auto border-x border-slate-800">
                    <header className="flex items-center justify-between px-8 py-5 border-b border-slate-800 glass sticky top-0 z-10">
                        <div className="flex items-center gap-3">
                            <i className="fas fa-shield-halved text-lime-500 text-xl"></i>
                            <div>
                                <h1 className="text-lg font-bold leading-none">PREDICADOR-PRO</h1>
                                <p className="text-[9px] tracking-[0.2em] text-slate-500 font-bold uppercase">Soli Deo Gloria</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-4">
                            <button onClick={toggleTheme} className="text-slate-400 hover:text-lime-500 text-xl transition-colors">
                                <i className={`fas ${theme === 'dark' ? 'fa-sun' : 'fa-moon'}`}></i>
                            </button>
                            <div className="bg-lime-500 text-black text-[10px] font-black px-3 py-1 rounded-full">MODO PRO</div>
                        </div>
                    </header>

                    <main className="flex-1 overflow-y-auto p-6 md:p-10 space-y-8">
                        {messages.length === 0 && (
                            <div className="h-full flex flex-col items-center justify-center opacity-10 text-center">
                                <i className="fas fa-book-open text-7xl mb-4"></i>
                                <h2 className="text-3xl font-bold italic">Laboratorio Homilético</h2>
                            </div>
                        )}
                        {messages.map((msg, i) => (
                            <div key={i} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                <div className={`p-6 rounded-[1.5rem] max-w-[90%] border ${msg.role === 'user' ? 'bg-lime-500 text-black border-lime-400' : 'card'}`}>
                                    <div className="theological-paper whitespace-pre-wrap">{msg.content}</div>
                                </div>
                            </div>
                        ))}
                        {isLoading && <div className="text-lime-500 animate-pulse text-xs font-bold tracking-widest"><i className="fas fa-spinner fa-spin mr-2"></i>ANALIZANDO...</div>}
                    </main>

                    <footer className="p-6 border-t border-slate-800">
                        <div className="flex gap-3 bg-black/40 border border-slate-700 rounded-2xl p-2 items-center">
                            <textarea value={input} onChange={(e) => setInput(e.target.value)} placeholder="Pasaje o tema..." className="flex-1 bg-transparent border-none p-3 outline-none text-white resize-none" rows="1" />
                            <button onClick={() => {
                                const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
                                rec.lang = 'es-PY'; rec.start();
                                rec.onresult = (e) => setInput(e.results[0][0].transcript);
                            }} className="text-slate-500 hover:text-lime-500 p-2"><i className="fas fa-microphone text-xl"></i></button>
                            <button onClick={handleSend} className="bg-lime-500 text-black p-4 rounded-xl hover:scale-105 transition-transform"><i className="fas fa-paper-plane"></i></button>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
