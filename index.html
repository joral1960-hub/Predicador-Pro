<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente del Predicador v21.0 - Edición Revelación</title>
    <!-- Estilos de Alta Gama -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f0f12; color: #e2e8f0; margin: 0; overflow: hidden; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #1a1a20; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .glass-header { background: rgba(26, 26, 32, 0.9); backdrop-filter: blur(16px); }
        .message-in { animation: slideUp 0.4s cubic-bezier(0, 0, 0.2, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .glow-lime { box-shadow: 0 0 20px rgba(132, 204, 22, 0.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SYSTEM_PROMPT = `Eres el Asistente Teológico Reformado de Jorge Álvarez. 
        Misión: Generar bosquejos de sermones profundos y estudios bíblicos.
        Marco: Biblia (Autoridad Suprema), Confesión de Fe de Londres de 1689, Teología Reformada Clásica.
        Proceso: Contexto, Exégesis, Doctrina, Evangelio, Aplicación y Bosquejo Homilético.
        Importante: Responde siempre en español con un tono pastoral, solemne y preciso.`;

        const Icon = ({ name, className }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const App = () => {
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_api_key') || '');
            const [showSettings, setShowSettings] = useState(false);
            const [status, setStatus] = useState('');
            const scrollRef = useRef(null);

            useEffect(() => {
                if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
            }, [messages, isLoading]);

            const saveKey = (key) => {
                const clean = key.trim().replace(/["']/g, "");
                setApiKey(clean);
                localStorage.setItem('gemini_api_key', clean);
                setShowSettings(false);
                alert("Llave actualizada. ¡Motor 2.5 listo!");
            };

            const testModels = async () => {
                if (!apiKey) return alert("Por favor, pega tu API Key primero.");
                setStatus("Escaneando motores...");
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
                    const data = await res.json();
                    if (data.models) {
                        const list = data.models
                            .filter(m => m.supportedGenerationMethods.includes("generateContent"))
                            .map(m => m.name.replace("models/", ""))
                            .join("\n• ");
                        alert("¡CONEXIÓN EXITOSA!\n\nMotores detectados en tu cuenta:\n• " + list);
                    } else {
                        alert("Error de Google: " + (data.error?.message || "Llave inválida"));
                    }
                } catch (e) {
                    alert("Fallo de red: " + e.message);
                } finally { setStatus(""); }
            };

            const callGemini = async (currentHistory) => {
                // Versión 21.0: Usamos EXACTAMENTE los nombres que tu diagnóstico mostró como disponibles
                const attempts = [
                    { v: 'v1beta', m: 'gemini-2.5-flash' }, // Tu primera opción exitosa
                    { v: 'v1beta', m: 'gemini-2.0-flash' }, // Tu segunda opción exitosa
                    { v: 'v1beta', m: 'gemini-1.5-flash' },
                    { v: 'v1', m: 'gemini-1.5-flash' }
                ];

                let lastError = "";

                for (const attempt of attempts) {
                    try {
                        setStatus(`Llamando al motor ${attempt.m}...`);
                        const url = `https://generativelanguage.googleapis.com/${attempt.v}/models/${attempt.m}:generateContent?key=${apiKey}`;
                        
                        const body = {
                            contents: [
                                { role: 'user', parts: [{ text: `INSTRUCCIONES DE IDENTIDAD: ${SYSTEM_PROMPT}. Confirma disponibilidad.` }] },
                                { role: 'model', parts: [{ text: "Entendido. Soy el asistente de Jorge Álvarez. Base de datos reformada activa. ¿Qué pasaje estudiaremos hoy?" }] },
                                ...currentHistory.map(m => ({
                                    role: m.role === 'assistant' ? 'model' : 'user',
                                    parts: [{ text: m.content }]
                                }))
                            ]
                        };

                        const response = await fetch(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(body)
                        });

                        const data = await response.json();
                        if (response.ok && data.candidates?.[0]?.content?.parts?.[0]?.text) {
                            return data.candidates[0].content.parts[0].text;
                        } else {
                            lastError = data.error?.message || "Error en respuesta";
                        }
                    } catch (e) {
                        lastError = e.message;
                    }
                }
                throw new Error(lastError);
            };

            const handleSend = async () => {
                if (!input.trim() || isLoading) return;
                if (!apiKey) { setShowSettings(true); return; }

                const userMsg = { role: 'user', content: input };
                const newHistory = [...messages, userMsg];
                setMessages(newHistory);
                setInput('');
                setIsLoading(true);

                try {
                    const aiRes = await callGemini(newHistory);
                    setMessages([...newHistory, { role: 'assistant', content: aiRes }]);
                } catch (err) {
                    setMessages([...newHistory, { role: 'assistant', content: `❌ ERROR TÉCNICO:\n"${err.message}"\n\nJorge, tu diagnóstico mostró que tienes motores 2.5 y 2.0. Si esto falla, intenta escribir "Hola" para despertar la conexión.` }]);
                } finally {
                    setIsLoading(false);
                    setStatus('');
                }
            };

            return (
                <div className="flex flex-col h-screen max-w-5xl mx-auto bg-[#0f0f12] border-x border-slate-800 shadow-2xl relative overflow-hidden">
                    {/* Header */}
                    <header className="glass-header flex items-center justify-between px-6 py-4 border-b border-slate-800 shrink-0 z-30">
                        <div className="flex items-center gap-4">
                            <div className="p-2.5 bg-lime-500/10 rounded-xl text-lime-400 border border-lime-500/20 shadow-lg glow-lime">
                                <Icon name="shield" className="w-6 h-6" />
                            </div>
                            <div>
                                <h1 className="text-lg font-bold text-white tracking-tight leading-none mb-1">Asistente Predicador <span className="text-lime-500 text-[10px] ml-1 font-mono uppercase border border-lime-500/30 px-1 rounded">v21.0</span></h1>
                                <p className="text-[10px] text-slate-500 font-bold tracking-[0.2em] uppercase">Soli Deo Gloria • 1689</p>
                            </div>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => setShowSettings(true)} className="p-2.5 hover:bg-slate-800 rounded-xl text-slate-400 border border-transparent hover:border-slate-700 transition-all">
                                <Icon name="settings" className="w-5 h-5" />
                            </button>
                            <button onClick={() => setMessages([])} className="p-2.5 hover:bg-slate-800 rounded-xl text-slate-400 border border-transparent hover:border-slate-700 transition-all">
                                <Icon name="refresh-cw" className="w-5 h-5" />
                            </button>
                        </div>
                    </header>

                    {/* Chat Area */}
                    <main ref={scrollRef} className="flex-1 overflow-y-auto p-4 md:p-12 space-y-10 bg-[#0f0f12]">
                        {messages.length === 0 && (
                            <div className="flex flex-col items-center justify-center h-full text-center space-y-8 opacity-40">
                                <div className="p-12 bg-slate-800/20 rounded-full border border-lime-500/10 shadow-inner">
                                    <Icon name="book-open" className="w-28 h-28 text-lime-500/70" />
                                </div>
                                <div className="space-y-3">
                                    <h2 className="text-3xl font-bold text-white tracking-[0.4em]">REFORMADOS</h2>
                                    <p className="text-sm max-w-sm mx-auto italic text-slate-400 leading-relaxed font-medium">
                                        "Tu palabra es una lámpara a mis pies..." <br/> Motor 2.5 listo para el servicio.
                                    </p>
                                </div>
                            </div>
                        )}
                        {messages.map((msg, i) => (
                            <div key={i} className={`flex flex-col message-in ${msg.role === 'user' ? 'items-end' : 'items-start'}`}>
                                <div className={`p-7 rounded-[2rem] max-w-[95%] md:max-w-[85%] whitespace-pre-wrap leading-relaxed shadow-2xl text-sm md:text-base border ${
                                    msg.role === 'user' ? 'bg-blue-600 border-blue-500 text-white rounded-tr-none' : 'bg-[#1a1a20] border border-slate-800 text-slate-200 rounded-tl-none'
                                }`}>
                                    {msg.content}
                                </div>
                                {msg.role === 'assistant' && !msg.content.includes('❌') && (
                                    <button 
                                        onClick={() => { navigator.clipboard.writeText(msg.content); alert("Copiado."); }} 
                                        className="mt-4 text-[10px] font-bold text-slate-500 hover:text-lime-500 flex items-center gap-2 ml-5 transition-all uppercase bg-slate-800/40 px-4 py-2 rounded-full border border-slate-700/50 hover:border-lime-500/30"
                                    >
                                        <Icon name="copy" className="w-3.5 h-3.5" /> Copiar Bosquejo
                                    </button>
                                )}
                            </div>
                        ))}
                        {isLoading && (
                            <div className="flex flex-col gap-4 items-start px-4">
                                <div className="flex gap-4 items-center text-slate-500 text-sm font-semibold animate-pulse">
                                    <Icon name="loader-2" className="w-6 h-6 animate-spin text-lime-500" />
                                    Accediendo a la nueva generación 2.5...
                                </div>
                                <div className="text-[10px] text-lime-500/50 font-mono ml-10 tracking-[0.2em] uppercase">{status}</div>
                            </div>
                        )}
                    </main>

                    {/* Input Area */}
                    <footer className="p-8 bg-[#1a1a20] border-t border-slate-800 shrink-0 z-20">
                        <div className="max-w-4xl mx-auto flex gap-4 items-end">
                            <textarea
                                value={input}
                                onChange={(e) => setInput(e.target.value)}
                                onKeyDown={(e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } }}
                                placeholder="Escribe el pasaje aquí..."
                                className="w-full bg-[#0b0b0d] text-white border border-slate-700 rounded-2xl px-7 py-5 outline-none focus:border-lime-500 focus:ring-4 focus:ring-lime-500/5 transition-all resize-none shadow-inner text-sm md:text-base min-h-[64px]"
                                rows="1"
                            />
                            <button 
                                onClick={handleSend} 
                                disabled={isLoading || !input.trim()}
                                className={`p-5 rounded-2xl transition-all shadow-xl active:scale-90 flex items-center justify-center ${isLoading || !input.trim() ? 'bg-slate-800 text-slate-500' : 'bg-lime-500 text-black hover:bg-lime-400 shadow-lime-500/20'}`}
                            >
                                <Icon name="send" className="w-6 h-6" />
                            </button>
                        </div>
                    </footer>

                    {/* Settings Modal */}
                    {showSettings && (
                        <div className="fixed inset-0 bg-black/95 flex items-center justify-center p-4 z-50 backdrop-blur-xl">
                            <div className="bg-[#1a1a20] p-12 rounded-[3rem] border border-slate-800 max-w-md w-full space-y-10 shadow-2xl text-center">
                                <div className="p-5 bg-lime-500/10 rounded-full w-fit mx-auto border border-lime-500/20 shadow-inner">
                                    <Icon name="key" className="w-14 h-14 text-lime-400" />
                                </div>
                                <div className="space-y-2">
                                    <h3 className="text-2xl font-bold text-white tracking-tighter uppercase">Nueva Generación</h3>
                                    <p className="text-xs text-slate-400 px-6">Tu cuenta usa motores 2.5 y 2.0. La v21.0 ya está calibrada para ellos.</p>
                                </div>
                                <input 
                                    type="password" 
                                    value={apiKey} 
                                    onChange={(e) => setApiKey(e.target.value)}
                                    placeholder="API KEY..."
                                    className="w-full bg-[#0b0b0d] border border-slate-700 p-6 rounded-3xl text-white outline-none focus:border-lime-400 text-center font-mono text-xs tracking-widest shadow-2xl"
                                />
                                <div className="flex gap-4">
                                    <button onClick={() => saveKey(apiKey)} className="flex-[2] bg-lime-500 text-black py-5 rounded-[1.5rem] font-bold hover:bg-lime-400 shadow-lg transition-all uppercase text-xs tracking-widest">Guardar</button>
                                    <button onClick={testModels} className="p-5 bg-slate-700 text-white rounded-[1.5rem] hover:bg-slate-600 transition-all shadow-lg" title="Diagnóstico">
                                        <Icon name="stethoscope" className="w-6 h-6" />
                                    </button>
                                    <button onClick={() => setShowSettings(false)} className="flex-1 bg-slate-800 text-white py-5 rounded-[1.5rem] font-bold hover:bg-slate-700 transition-all uppercase text-xs tracking-widest">Cerrar</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
