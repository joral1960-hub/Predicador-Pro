<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PREDICADOR-PRO | Acceso Ministerial</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display:wght@400;700&display=swap');

        :root {
            --gold: #d4af37;
            --bg: #0a0a0b;
            --card: #161618;
            --text: #e8e8e8;
            --parchment: #f4ecd8;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Playfair Display', serif;
            display: flex; justify-content: center; align-items: center;
        }

        .app-container {
            width: 90%; max-width: 500px;
            background: var(--card);
            padding: 50px 40px;
            border-radius: 4px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.9);
            border-top: 4px solid var(--gold);
            text-align: center;
            position: relative;
        }

        h1 { font-family: 'Cinzel', serif; color: var(--gold); letter-spacing: 5px; font-size: 26px; margin: 0; text-transform: uppercase; }
        .motto { font-size: 10px; letter-spacing: 4px; color: #666; margin-bottom: 40px; text-transform: uppercase; }
        .bible-icon { font-size: 70px; color: #d3c4a8; margin-bottom: 30px; opacity: 0.8; }

        .input-group { text-align: left; margin-bottom: 30px; }
        label { display: block; color: var(--gold); font-size: 11px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; font-weight: bold; }

        input, textarea {
            width: 100%; background: #000; border: 1px solid #2a2a2c;
            color: #fff; padding: 15px; box-sizing: border-box;
            font-family: 'Playfair Display', serif; font-size: 16px;
        }

        .btn-gold {
            width: 100%; padding: 18px; background: var(--gold);
            color: #000; border: none; font-weight: bold;
            cursor: pointer; text-transform: uppercase; letter-spacing: 2px;
            font-size: 13px; transition: 0.3s;
        }
        .btn-gold:hover { background: #fff; transform: translateY(-2px); }

        .theme-switcher { position: absolute; top: 20px; right: 25px; color: var(--gold); font-size: 20px; cursor: pointer; }
        .light-mode { background-color: #333 !important; }
        .light-mode .app-container { background: var(--parchment); color: #1a1a1a; border-top: 4px solid #8b4513; }
        .light-mode h1, .light-mode label { color: #8b4513; }
        .light-mode input, .light-mode textarea { background: #fff; color: #000; border: 1px solid #d3c4a8; }
        .light-mode .btn-gold { background: #8b4513; color: #fff; }

        .footer { margin-top: 40px; font-size: 10px; color: #444; letter-spacing: 1px; }
    </style>
</head>
<body id="main-body">

    <div class="app-container">
        <div class="theme-switcher" onclick="toggleTheme()">
            <i class="fas fa-scroll"></i>
        </div>

        <h1>PREDICADOR-PRO</h1>
        <div class="motto">Soli Deo Gloria</div>

        <div id="auth-box">
            <div class="bible-icon"><i class="fas fa-book-open"></i></div>
            <div class="input-group">
                <label>Credencial de Acceso Ministerial</label>
                <input type="text" id="license-key" placeholder="INGRESE SU CÓDIGO">
            </div>
            <button class="btn-gold" onclick="verificarLicencia()">Activar Ministerio</button>
        </div>

        <div id="main-app" style="display: none;">
            <div class="input-group">
                <label>Consulta o Pasaje Bíblico</label>
                <textarea id="user-input" rows="5" placeholder="Escriba aquí..."></textarea>
            </div>
            <button class="btn-gold" onclick="alert('Estudio procesado con éxito.')">GENERAR ESTUDIO PROFUNDO</button>
            <div style="margin-top: 20px;">
                <i class="fas fa-microphone" style="color:var(--gold); cursor:pointer; font-size: 24px;" onclick="startSpeech()"></i>
            </div>
        </div>

        <div class="footer">ADMIN: JORGE ÁLVAREZ | VILLA ELIZA, PY</div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBf9xenhC3kO4vhO8EJMDnVAYm7L-S_jRU",
        authDomain: "predicador-pro.firebaseapp.com",
        projectId: "predicador-pro",
        storageBucket: "predicador-pro.appspot.com",
        messagingSenderId: "54203135548",
        appId: "1:54203135548:web:7f3b832b85a3637e96b8c8"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function toggleTheme() {
        document.getElementById('main-body').classList.toggle('light-mode');
    }

    async function verificarLicencia() {
        const key = document.getElementById('license-key').value.trim().toUpperCase();
        const doc = await db.collection("artifacts/predicador-pro-default/public/data/licenses").doc(key).get();
        if (doc.exists && doc.data().active) {
            document.getElementById('auth-box').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
        } else {
            alert("Acceso No Autorizado.");
        }
    }

    function startSpeech() {
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = 'es-PY'; rec.start();
        rec.onresult = (e) => { document.getElementById('user-input').value = e.results[0][0].transcript; };
    }
</script>
</body>
</html>
