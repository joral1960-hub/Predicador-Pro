<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente del Predicador v18.0 - Edición Victoria</title>
    <!-- Estilos de Alta Gama -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f0f12; color: #e2e8f0; margin: 0; overflow: hidden; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #1a1a20; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .glass-header { background: rgba(26, 26, 32, 0.85); backdrop-filter: blur(12px); }
        .message-in { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- BIBLIOTECA PERSONALIZABLE ---
        const MI_BIBLIOTECA = `
        FUENTES ACTIVAS:
        - Biblia (Versión Reina Valera 1960 / LBLA).
        - Confesión de Fe de Londres de 1689.
        - Institución de la Religión Cristiana (Calvino).
        - El Tesoro de David (Spurgeon).
        - Comentario Bíblico de Matthew Henry.
        - Teología Sistemática de Louis Berkhof.
        `;

        const SYSTEM_PROMPT = `Eres el Asistente Teológico Reformado de Jorge Álvarez. 
        Tu misión es generar bosquejos de sermones y estudios bíblicos profundos.
        MARCO: Biblia como autoridad infalible, Teología Reformada, soberanía de Dios.
        ESTILO: Pastoral, solemne, cristocéntrico.
        BIBLIOTECA: ${MI_BIBLIOTECA}.
        PROCESO: Contexto, Exégesis, Doctrina, Evangelio, Aplicación y Bosquejo final.
        IMPORTANTE: Habla siempre en español. Mantén el hilo de la charla.`;

        const Icon = ({ name, className }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const App = () => {
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_api_key') || '');
            const [showSettings, setShowSettings] = useState(false);
            const [status, setStatus] = useState('');
            const scrollRef = useRef(null);

            useEffect(() => {
                if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
            }, [messages, isLoading]);

            const saveKey = (key) => {
                const clean = key.trim().replace(/["']/g, "");
                setApiKey(clean);
                localStorage.setItem('gemini_api_key', clean);
                setShowSettings(false);
                alert("Llave guardada. ¡Victoria!");
            };

            const callGemini = async (currentHistory) => {
                // Versión 18.0: Probamos los 3 caminos más seguros de Google actualmente
                const endpoints = [
                    { v: 'v1beta', m: 'gemini-1.5-flash' },
                    { v: 'v1', m: 'gemini-1.5-flash' },
                    { v: 'v1beta', m: 'gemini-1.5-flash-8b' }
                ];

                let lastError = "";

                for (const path of endpoints) {
                    try {
                        setStatus(`Conectando vía ${path.m}...`);
                        const url = `https://generativelanguage.googleapis.com/${path.v}/models/${path.m}:generateContent?key=${apiKey}`;
                        
                        // Inyección Directa: El método que no falla con las instrucciones
                        const body = {
                            contents: [
                                { role: 'user', parts: [{ text: `INSTRUCCIONES MAESTRAS: ${SYSTEM_PROMPT}. Confirma que estás listo.` }] },
                                { role: 'model', parts: [{ text: "Entendido. Soy el Asistente del Predicador de Jorge Álvarez. He cargado la sana doctrina. ¿En qué pasaje trabajaremos?" }] },
                                ...currentHistory.map(m => ({
                                    role: m.role === 'assistant' ? 'model' : 'user',
                                    parts: [{ text: m.content }]
                                }))
                            ]
                        };

                        const response = await fetch(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(body)
                        });

                        const data = await response.json();
                        if (response.ok && data.candidates?.[0]?.content?.parts?.[0]?.text) {
                            return data.candidates[0].content.parts[0].text;
                        } else {
                            lastError = data.error?.message || "Respuesta incompleta";
                        }
                    } catch (e) {
                        lastError = e.message;
                    }
                }
                throw new Error(lastError);
            };

            const handleSend = async () => {
                if (!input.trim() || isLoading) return;
                if (!apiKey) { setShowSettings(true); return; }

                const userMsg = { role: 'user', content: input };
                const newHistory = [...messages, userMsg];
                setMessages(newHistory);
                setInput('');
                setIsLoading(true);

                try {
                    const aiRes = await callGemini(newHistory);
                    setMessages([...newHistory, { role: 'assistant', content: aiRes }]);
                } catch (err) {
                    setMessages([...newHistory, { role: 'assistant', content: `❌ ERROR DE CONEXIÓN:\n"${err.message}"\n\nJorge, verifica que tu API Key sea la correcta en el icono ⚙️.` }]);
                } finally {
                    setIsLoading(false);
                    setStatus('');
                }
            };

            return (
                <div className="flex flex-col h-screen max-w-5xl mx-auto bg-[#0f0f12] border-x border-slate-800 shadow-2xl relative">
                    {/* Encabezado Fijo */}
                    <header className="glass-header flex items-center justify-between px-6 py-4 border-b border-slate-800 shrink-0 z-20">
                        <div className="flex items-center gap-4">
                            <div className="p-2.5 bg-lime-500/10 rounded-xl text-lime-400 border border-lime-500/20 shadow-lg">
                                <Icon name="shield" className="w-6 h-6" />
                            </div>
                            <div>
                                <h1 className="text-lg font-bold text-white tracking-tight leading-none mb-1">Asistente Predicador <span className="text-lime-500 text-[10px] ml-1 font-mono uppercase border border-lime-500/30 px-1 rounded">v18.0</span></h1>
                                <p className="text-[10px] text-slate-500 font-bold tracking-[0.2em] uppercase">Soli Deo Gloria • 1689</p>
                            </div>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => setShowSettings(true)} className="p-2.5 hover:bg-slate-800 rounded-xl text-slate-400 transition-all border border-transparent hover:border-slate-700">
                                <Icon name="settings" className="w-5 h-5" />
                            </button>
                            <button onClick={() => setMessages([])} className="p-2.5 hover:bg-slate-800 rounded-xl text-slate-400 transition-all border border-transparent hover:border-slate-700">
                                <Icon name="refresh-cw" className="w-5 h-5" />
                            </button>
                        </div>
                    </header>

                    {/* Chat con Scroll */}
                    <main ref={scrollRef} className="flex-1 overflow-y-auto p-4 md:p-10 space-y-8 bg-[#0f0f12]">
                        {messages.length === 0 && (
                            <div className="flex flex-col items-center justify-center h-full text-center space-y-8 opacity-40">
                                <div className="p-10 bg-slate-800/30 rounded-full border border-lime-500/10 shadow-inner">
                                    <Icon name="book-open" className="w-24 h-24 text-lime-500/80" />
                                </div>
                                <div className="space-y-3">
                                    <h2 className="text-2xl font-bold text-white tracking-[0.3em]">REFORMADOS</h2>
                                    <p className="text-sm max-w-sm mx-auto italic text-slate-400 leading-relaxed font-medium">
                                        Preparado para el estudio de hoy. Ingrese un pasaje.
                                    </p>
                                </div>
                            </div>
                        )}
                        {messages.map((msg, i) => (
                            <div key={i} className={`flex flex-col message-in ${msg.role === 'user' ? 'items-end' : 'items-start'}`}>
                                <div className={`p-6 rounded-3xl max-w-[95%] md:max-w-[85%] whitespace-pre-wrap leading-relaxed shadow-2xl text-sm md:text-base border ${
                                    msg.role === 'user' ? 'bg-blue-600 border-blue-500 text-white rounded-tr-none' : 'bg-[#1a1a20] border-slate-800 text-slate-200 rounded-tl-none'
                                }`}>
                                    {msg.content}
                                </div>
                                {msg.role === 'assistant' && !msg.content.includes('❌') && (
                                    <button 
                                        onClick={() => { navigator.clipboard.writeText(msg.content); alert("¡Copiado!"); }} 
                                        className="mt-3 text-[10px] font-bold text-slate-500 hover:text-lime-500 flex items-center gap-2 ml-4 transition-all uppercase bg-slate-800/40 px-3 py-1.5 rounded-full border border-slate-700/50"
                                    >
                                        <Icon name="copy" className="w-3.5 h-3.5" /> Copiar Bosquejo
                                    </button>
                                )}
                            </div>
                        ))}
                        {isLoading && (
                            <div className="flex flex-col gap-3 items-start px-2">
                                <div className="flex gap-4 items-center text-slate-500 text-sm font-medium animate-pulse">
                                    <Icon name="loader-2" className="w-5 h-5 animate-spin text-lime-500" />
                                    Escudriñando...
                                </div>
                                <div className="text-[10px] text-lime-500/40 font-mono ml-9 tracking-widest uppercase">{status}</div>
                            </div>
                        )}
                    </main>

                    {/* Input Fijo al Final */}
                    <footer className="p-6 bg-[#1a1a20] border-t border-slate-800 shrink-0">
                        <div className="max-w-4xl mx-auto flex gap-3 items-end">
                            <textarea
                                value={input}
                                onChange={(e) => setInput(e.target.value)}
                                onKeyDown={(e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } }}
                                placeholder="Ingrese pasaje o tema..."
                                className="w-full bg-[#0b0b0d] text-white border border-slate-700 rounded-2xl px-6 py-4 outline-none focus:border-lime-500 transition-all resize-none shadow-inner text-sm md:text-base min-h-[58px]"
                                rows="1"
                            />
                            <button 
                                onClick={handleSend} 
                                disabled={isLoading || !input.trim()}
                                className={`p-4 rounded-2xl transition-all shadow-lg active:scale-95 flex items-center justify-center ${isLoading || !input.trim() ? 'bg-slate-800 text-slate-500' : 'bg-lime-500 text-black hover:bg-lime-400 shadow-lime-500/20'}`}
                            >
                                <Icon name="send" className="w-5 h-5" />
                            </button>
                        </div>
                    </footer>

                    {/* Ajustes Modal */}
                    {showSettings && (
                        <div className="fixed inset-0 bg-black/90 flex items-center justify-center p-4 z-50 backdrop-blur-md">
                            <div className="bg-[#1a1a20] p-10 rounded-[2.5rem] border border-slate-800 max-w-md w-full space-y-8 shadow-2xl text-center">
                                <div className="p-4 bg-lime-500/10 rounded-full w-fit mx-auto border border-lime-500/20">
                                    <Icon name="key" className="w-12 h-12 text-lime-400" />
                                </div>
                                <h3 className="text-2xl font-bold text-white tracking-tighter uppercase">API KEY GOOGLE</h3>
                                <input 
                                    type="password" 
                                    value={apiKey} 
                                    onChange={(e) => setApiKey(e.target.value)}
                                    placeholder="AIzaSy..."
                                    className="w-full bg-[#0b0b0d] border border-slate-700 p-5 rounded-2xl text-white outline-none focus:border-lime-400 text-center font-mono text-xs tracking-widest shadow-inner"
                                />
                                <div className="flex gap-4">
                                    <button onClick={() => saveKey(apiKey)} className="flex-1 bg-lime-500 text-black py-4 rounded-2xl font-bold hover:bg-lime-400 shadow-lg transition-all uppercase text-xs tracking-widest">Guardar</button>
                                    <button onClick={() => setShowSettings(false)} className="flex-1 bg-slate-800 text-white py-4 rounded-2xl font-bold hover:bg-slate-700 transition-all uppercase text-xs tracking-widest">Cerrar</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
