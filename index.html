<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente del Predicador - Edición Profesional</title>
    <!-- Estilos de Alta Gama -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap');
        
        body { font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; transition: background-color 0.3s ease; }
        
        /* Personalización de Scroll */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #84cc16; border-radius: 10px; }

        /* Estilos de Mensajes modo documento */
        .prose-content h2 { font-family: 'Playfair Display', serif; font-size: 1.5rem; margin-top: 1.5rem; margin-bottom: 0.5rem; color: #84cc16; border-bottom: 1px solid rgba(132, 204, 22, 0.2); padding-bottom: 4px; }
        .prose-content h3 { font-weight: 700; margin-top: 1rem; text-transform: uppercase; font-size: 0.9rem; letter-spacing: 0.05em; opacity: 0.9; }
        .prose-content p { margin-bottom: 0.75rem; line-height: 1.6; }
        .prose-content ul { margin-left: 1.25rem; list-style-type: disc; margin-bottom: 1rem; }
        .prose-content li { margin-bottom: 0.25rem; }

        .message-in { animation: slideUp 0.4s cubic-bezier(0, 0, 0.2, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SYSTEM_PROMPT = `Eres el Asistente Teológico Reformado de Jorge Álvarez. 
        Misión: Generar bosquejos de sermones profundos y estudios bíblicos.
        Marco: Biblia (Autoridad Suprema), Confesión de Fe de Londres de 1689, Teología Reformada Clásica.
        Formato: Usa títulos claros (## Título), subtítulos (### Sección) y listas para que el resultado sea elegante.
        Proceso: Contexto, Exégesis, Doctrina, Evangelio, Aplicación y Bosquejo Homilético.
        Importante: Responde siempre en español con un tono pastoral y preciso.`;

        const Icon = ({ name, className }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        // Función para dar formato visual al texto del asistente sin librerías externas
        const FormattedText = ({ text }) => {
            const lines = text.split('\n');
            return (
                <div className="prose-content">
                    {lines.map((line, i) => {
                        if (line.startsWith('## ')) return <h2 key={i}>{line.replace('## ', '')}</h2>;
                        if (line.startsWith('### ')) return <h3 key={i}>{line.replace('### ', '')}</h3>;
                        if (line.startsWith('- ') || line.startsWith('* ')) return <li key={i} className="ml-4">{line.substring(2)}</li>;
                        if (line.trim() === '') return <div key={i} className="h-2"></div>;
                        
                        // Negritas básicas
                        const parts = line.split(/(\*\*.*?\*\*)/g);
                        return (
                            <p key={i}>
                                {parts.map((part, j) => 
                                    part.startsWith('**') && part.endsWith('**') 
                                    ? <strong key={j} className="text-lime-500 font-bold">{part.slice(2, -2)}</strong> 
                                    : part
                                )}
                            </p>
                        );
                    })}
                </div>
            );
        };

        const App = () => {
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_api_key') || '');
            const [theme, setTheme] = useState(localStorage.getItem('app_theme') || 'dark');
            const [showSettings, setShowSettings] = useState(false);
            const [status, setStatus] = useState('');
            const scrollRef = useRef(null);

            useEffect(() => {
                if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
                localStorage.setItem('app_theme', theme);
            }, [messages, isLoading, theme]);

            const saveKey = (key) => {
                const clean = key.trim().replace(/["']/g, "");
                setApiKey(clean);
                localStorage.setItem('gemini_api_key', clean);
                setShowSettings(false);
            };

            const toggleTheme = () => setTheme(prev => prev === 'dark' ? 'light' : 'dark');

            const callGemini = async (currentHistory) => {
                const attempts = [
                    { v: 'v1beta', m: 'gemini-2.5-flash' }, 
                    { v: 'v1beta', m: 'gemini-2.0-flash' },
                    { v: 'v1', m: 'gemini-1.5-flash' }
                ];

                let lastError = "";
                for (const attempt of attempts) {
                    try {
                        setStatus(`Conectando...`);
                        const url = `https://generativelanguage.googleapis.com/${attempt.v}/models/${attempt.m}:generateContent?key=${apiKey}`;
                        const response = await fetch(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [
                                    { role: 'user', parts: [{ text: `INSTRUCCIONES: ${SYSTEM_PROMPT}.` }] },
                                    { role: 'model', parts: [{ text: "Entendido. Listo para el servicio." }] },
                                    ...currentHistory.map(m => ({
                                        role: m.role === 'assistant' ? 'model' : 'user',
                                        parts: [{ text: m.content }]
                                    }))
                                ]
                            })
                        });
                        const data = await response.json();
                        if (response.ok && data.candidates?.[0]?.content?.parts?.[0]?.text) {
                            return data.candidates[0].content.parts[0].text;
                        } else {
                            lastError = data.error?.message || "Error";
                        }
                    } catch (e) { lastError = e.message; }
                }
                throw new Error(lastError);
            };

            const handleSend = async () => {
                if (!input.trim() || isLoading) return;
                if (!apiKey) { setShowSettings(true); return; }

                const userMsg = { role: 'user', content: input };
                const newHistory = [...messages, userMsg];
                setMessages(newHistory);
                setInput('');
                setIsLoading(true);

                try {
                    const aiRes = await callGemini(newHistory);
                    setMessages([...newHistory, { role: 'assistant', content: aiRes }]);
                } catch (err) {
                    setMessages([...newHistory, { role: 'assistant', content: `❌ Error de Conexión: "${err.message}"` }]);
                } finally {
                    setIsLoading(false);
                    setStatus('');
                }
            };

            const isDark = theme === 'dark';

            return (
                <div className={`flex flex-col h-screen max-w-5xl mx-auto border-x shadow-2xl relative overflow-hidden transition-all duration-500 ${
                    isDark ? 'bg-[#0f0f12] border-slate-800 text-slate-200' : 'bg-slate-50 border-slate-200 text-slate-800'
                }`}>
                    
                    {/* Header */}
                    <header className={`flex items-center justify-between px-6 py-4 border-b shrink-0 z-30 backdrop-blur-md ${
                        isDark ? 'bg-[#1a1a20]/90 border-slate-800' : 'bg-white/90 border-slate-200 shadow-sm'
                    }`}>
                        <div className="flex items-center gap-4">
                            <div className={`p-2.5 rounded-xl border shadow-lg transition-colors ${
                                isDark ? 'bg-lime-500/10 text-lime-400 border-lime-500/20' : 'bg-lime-500 text-white border-lime-600'
                            }`}>
                                <Icon name="shield" className="w-6 h-6" />
                            </div>
                            <div>
                                <h1 className={`text-lg font-bold tracking-tight leading-none mb-1 ${isDark ? 'text-white' : 'text-slate-900'}`}>Asistente Predicador</h1>
                                <p className={`text-[10px] font-bold tracking-[0.2em] uppercase ${isDark ? 'text-slate-500' : 'text-slate-400'}`}>Soli Deo Gloria</p>
                            </div>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={toggleTheme} className={`p-2.5 rounded-xl border transition-all ${
                                isDark ? 'text-slate-400 border-transparent hover:bg-slate-800' : 'text-slate-600 border-slate-200 hover:bg-slate-100'
                            }`}>
                                <Icon name={isDark ? "sun" : "moon"} className="w-5 h-5" />
                            </button>
                            <button onClick={() => setShowSettings(true)} className={`p-2.5 rounded-xl border transition-all ${
                                isDark ? 'text-slate-400 border-transparent hover:bg-slate-800' : 'text-slate-600 border-slate-200 hover:bg-slate-100'
                            }`}>
                                <Icon name="settings" className="w-5 h-5" />
                            </button>
                            <button onClick={() => setMessages([])} className={`p-2.5 rounded-xl border transition-all ${
                                isDark ? 'text-slate-400 border-transparent hover:bg-slate-800' : 'text-slate-600 border-slate-200 hover:bg-slate-100'
                            }`}>
                                <Icon name="refresh-cw" className="w-5 h-5" />
                            </button>
                        </div>
                    </header>

                    {/* Chat Area */}
                    <main ref={scrollRef} className="flex-1 overflow-y-auto p-4 md:p-12 space-y-10">
                        {messages.length === 0 && (
                            <div className="flex flex-col items-center justify-center h-full text-center space-y-8 opacity-40">
                                <div className={`p-12 rounded-full border shadow-inner transition-colors ${
                                    isDark ? 'bg-slate-800/20 border-lime-500/10' : 'bg-white border-lime-500/20 shadow-sm'
                                }`}>
                                    <Icon name="book-open" className={`w-28 h-28 ${isDark ? 'text-lime-500/70' : 'text-lime-500'}`} />
                                </div>
                                <div className="space-y-3">
                                    <h2 className={`text-3xl font-bold tracking-[0.4em] ${isDark ? 'text-white' : 'text-slate-900'}`}>REFORMADOS</h2>
                                    <p className={`text-sm max-w-sm mx-auto italic font-medium ${isDark ? 'text-slate-400' : 'text-slate-500'}`}>
                                        "Lámpara es a mis pies tu palabra..." <br/> Preparado para el estudio bíblico.
                                    </p>
                                </div>
                            </div>
                        )}
                        {messages.map((msg, i) => (
                            <div key={i} className={`flex flex-col message-in ${msg.role === 'user' ? 'items-end' : 'items-start'}`}>
                                <div className={`p-7 rounded-[2rem] max-w-[95%] md:max-w-[88%] shadow-2xl text-sm md:text-base border transition-all ${
                                    msg.role === 'user' 
                                    ? 'bg-blue-600 border-blue-500 text-white rounded-tr-none' 
                                    : (isDark ? 'bg-[#1a1a20] border-slate-800 text-slate-200 rounded-tl-none' : 'bg-white border-slate-200 text-slate-800 rounded-tl-none')
                                }`}>
                                    {msg.role === 'user' ? <p className="whitespace-pre-wrap leading-relaxed">{msg.content}</p> : <FormattedText text={msg.content} />}
                                </div>
                                {msg.role === 'assistant' && !msg.content.includes('❌') && (
                                    <button 
                                        onClick={() => { navigator.clipboard.writeText(msg.content); alert("¡Copiado al portapapeles!"); }} 
                                        className={`mt-4 text-[10px] font-bold flex items-center gap-2 ml-5 transition-all uppercase px-4 py-2 rounded-full border ${
                                            isDark ? 'text-slate-500 bg-slate-800/40 border-slate-700/50 hover:text-lime-500 hover:border-lime-500/30' : 'text-slate-400 bg-slate-100 border-slate-200 hover:text-lime-600 hover:border-lime-500'
                                        }`}
                                    >
                                        <Icon name="copy" className="w-3.5 h-3.5" /> Copiar Bosquejo
                                    </button>
                                )}
                            </div>
                        ))}
                        {isLoading && (
                            <div className="flex flex-col gap-4 items-start px-4">
                                <div className="flex gap-4 items-center text-sm font-semibold animate-pulse text-lime-500">
                                    <Icon name="loader-2" className="w-6 h-6 animate-spin" />
                                    <span>Escudriñando las Escrituras...</span>
                                </div>
                                <div className="text-[10px] opacity-50 font-mono ml-10 tracking-[0.2em] uppercase">{status}</div>
                            </div>
                        )}
                    </main>

                    {/* Input Area */}
                    <footer className={`p-8 border-t shrink-0 z-20 transition-colors ${
                        isDark ? 'bg-[#1a1a20] border-slate-800' : 'bg-white border-slate-200 shadow-[0_-4px_20px_rgba(0,0,0,0.03)]'
                    }`}>
                        <div className="max-w-4xl mx-auto flex gap-4 items-end">
                            <textarea
                                value={input}
                                onChange={(e) => setInput(e.target.value)}
                                onKeyDown={(e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } }}
                                placeholder="Escribe el pasaje o una pregunta..."
                                className={`w-full border rounded-2xl px-7 py-5 outline-none focus:ring-4 transition-all resize-none shadow-inner text-sm md:text-base min-h-[64px] ${
                                    isDark ? 'bg-[#0b0b0d] text-white border-slate-700 focus:border-lime-500 focus:ring-lime-500/5' : 'bg-slate-50 text-slate-900 border-slate-200 focus:border-lime-500 focus:ring-lime-500/10'
                                }`}
                                rows="1"
                            />
                            <button 
                                onClick={handleSend} 
                                disabled={isLoading || !input.trim()}
                                className={`p-5 rounded-2xl transition-all shadow-xl active:scale-90 flex items-center justify-center ${
                                    isLoading || !input.trim() ? 'bg-slate-400 text-white cursor-not-allowed opacity-50' : 'bg-lime-500 text-white hover:bg-lime-600 shadow-lime-500/20'
                                }`}
                            >
                                <Icon name="send" className="w-6 h-6" />
                            </button>
                        </div>
                    </footer>

                    {/* Settings Modal */}
                    {showSettings && (
                        <div className="fixed inset-0 bg-black/95 flex items-center justify-center p-4 z-50 backdrop-blur-xl">
                            <div className={`p-12 rounded-[3rem] border max-w-md w-full space-y-10 shadow-2xl text-center transition-colors ${
                                isDark ? 'bg-[#1a1a20] border-slate-800' : 'bg-white border-slate-100'
                            }`}>
                                <div className={`p-5 rounded-full w-fit mx-auto border shadow-inner transition-colors ${
                                    isDark ? 'bg-lime-500/10 border-lime-500/20 text-lime-400' : 'bg-lime-50 text-lime-500 border-lime-100'
                                }`}>
                                    <Icon name="key" className="w-14 h-14" />
                                </div>
                                <div className="space-y-2">
                                    <h3 className={`text-2xl font-bold tracking-tighter uppercase ${isDark ? 'text-white' : 'text-slate-900'}`}>Configuración</h3>
                                    <p className={`text-xs ${isDark ? 'text-slate-400' : 'text-slate-500'}`}>Versión 23.0 - Soporta temas y formato inteligente.</p>
                                </div>
                                <input 
                                    type="password" 
                                    value={apiKey} 
                                    onChange={(e) => setApiKey(e.target.value)}
                                    placeholder="API KEY..."
                                    className={`w-full border p-6 rounded-3xl text-center font-mono text-xs tracking-widest shadow-2xl outline-none focus:border-lime-400 transition-all ${
                                        isDark ? 'bg-[#0b0b0d] text-white border-slate-700' : 'bg-slate-50 text-slate-900 border-slate-200'
                                    }`}
                                />
                                <div className="flex gap-4">
                                    <button onClick={() => saveKey(apiKey)} className="flex-[2] bg-lime-500 text-white py-5 rounded-[1.5rem] font-bold hover:bg-lime-600 shadow-lg transition-all uppercase text-xs tracking-widest">Guardar</button>
                                    <button onClick={() => setShowSettings(false)} className={`flex-1 py-5 rounded-[1.5rem] font-bold transition-all uppercase text-xs tracking-widest ${
                                        isDark ? 'bg-slate-800 text-white hover:bg-slate-700' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'
                                    }`}>Cerrar</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
