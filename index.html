<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PREDICADOR-PRO | Homilética Avanzada</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
        
        const myFirebaseConfig = {
          apiKey: "AIzaSyC3tAC8y7E1SfnTWi08fwq7gMXP_mnmpfw", 
          authDomain: "predicador-pro.firebaseapp.com",
          projectId: "predicador-pro",
          storageBucket: "predicador-pro.firebasestorage.app",
          messagingSenderId: "145970938733",
          appId: "1:145970938733:web:357aa4d0523d2892891064",
          measurementId: "G-5B5W93LD31" 
        };

        try {
            const app = initializeApp(myFirebaseConfig);
            window.PredicadorDB = {
                db: getFirestore(app),
                auth: getAuth(app),
                doc: doc,
                getDoc: getDoc,
                signInAnonymously: signInAnonymously,
                appId: 'predicador-pro-default', // ID de tu proyecto en Canvas/Firebase
                ready: true
            };
        } catch (e) {
            console.error("Error Firebase:", e);
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:ital,wght@0,700;1,700&family=Crimson+Pro:wght@400;600&display=swap');
        body { font-family: 'Inter', sans-serif; margin: 0; background-color: #0f0f12; color: #f8fafc; }
        .theological-paper { font-family: 'Crimson Pro', serif; font-size: 1.25rem; line-height: 1.8; color: #cbd5e1; }
        .glass-effect { backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
        .message-in { animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- PROMPT MAESTRO ---
        const SYSTEM_PROMPT = `Eres PREDICADOR-PRO, el asistente de homilética de Jorge Álvarez. 
        TU MISIÓN: Generar bosquejos exegéticos, análisis de griego/hebreo y aplicaciones pastorales.
        MARCO DOCTRINAL: Biblia Reina Valera 1960 y la Confesión de Fe de Londres de 1689.
        TONO: Solemne, académico y profundamente bíblico.`;

        const FormattedResponse = ({ text }) => (
            <div className="theological-paper text-left">
                {text.split('\n').map((line, i) => (
                    <p key={i} className={line.trim() ? "mb-4" : "h-4"}>{line}</p>
                ))}
            </div>
        );

        const App = () => {
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [isLicenseValid, setIsLicenseValid] = useState(false);
            const [licenseCode, setLicenseCode] = useState(localStorage.getItem('predicador_license') || '');
            const [activeKey, setActiveKey] = useState(null);
            const [authError, setAuthError] = useState(null);
            const [isListening, setIsListening] = useState(false);

            // Validar Licencia en Firebase
            const validateLicense = async (code) => {
                if (!code) return;
                setAuthError(null);
                
                try {
                    if (!window.PredicadorDB?.ready) throw new Error("Conectando con el servidor...");
                    
                    await window.PredicadorDB.signInAnonymously(window.PredicadorDB.auth);
                    const { db, appId, doc, getDoc } = window.PredicadorDB;
                    
                    const licenseRef = doc(db, 'artifacts', appId, 'public', 'data', 'licenses', code.trim().toUpperCase());
                    const snap = await getDoc(licenseRef);
                    
                    if (snap.exists() && snap.data().active) {
                        setActiveKey(snap.data().apiKey || snap.data().apikey);
                        setIsLicenseValid(true);
                        localStorage.setItem('predicador_license', code.toUpperCase());
                    } else {
                        setAuthError("Código inválido o suscripción vencida.");
                    }
                } catch (err) { setAuthError(err.message); }
            };

            useEffect(() => { if (licenseCode) validateLicense(licenseCode); }, []);

            // Función para obtener Berkhof de Firebase
            async function consultarBerkhof() {
                try {
                    const { db, appId, doc, getDoc } = window.PredicadorDB;
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'biblioteca', 'BERKHOF');
                    const snap = await getDoc(docRef);
                    return snap.exists() ? JSON.stringify(snap.data()) : "";
                } catch (e) { return ""; }
            }

            // Dictado por Voz
            const startSpeech = () => {
                const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
                recognition.lang = 'es-PY';
                recognition.onstart = () => setIsListening(true);
                recognition.onresult = (e) => {
                    setInput(e.results[0][0].transcript);
                    setIsListening(false);
                };
                recognition.onerror = () => setIsListening(false);
                recognition.start();
            };

            const handleSend = async () => {
                if (!input.trim() || isLoading) return;
                
                const userMsg = { role: 'user', content: input };
                setMessages(prev => [...prev, userMsg]);
                setInput('');
                setIsLoading(true);

                try {
                    const extraData = await consultarBerkhof();
                    const promptFinal = `${SYSTEM_PROMPT} \n REFERENCIA BIBLIOTECA: ${extraData} \n CONSULTA: ${input}`;

                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${activeKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: promptFinal }] }] })
                    });
                    
                    const data = await res.json();
                    const botText = data.candidates[0].content.parts[0].text;
                    setMessages(prev => [...prev, { role: 'assistant', content: botText }]);
                } catch (err) {
                    setMessages(prev => [...prev, { role: 'assistant', content: "Error al conectar con el motor de sabiduría." }]);
                } finally { setIsLoading(false); }
            };

            if (!isLicenseValid) {
                return (
                    <div className="flex items-center justify-center h-screen bg-[#0a0a0c] p-6">
                        <div className="max-w-md w-full bg-[#16161a] p-10 rounded-[2.5rem] border border-slate-800 text-center shadow-2xl">
                            <i className="fas fa-shield-halved text-5xl text-lime-500 mb-6"></i>
                            <h2 className="text-2xl font-bold text-white mb-2 uppercase tracking-tighter">Acceso Restringido</h2>
                            <p className="text-slate-500 text-sm mb-8 italic">Soli Deo Gloria | Predicador-Pro</p>
                            <input 
                                type="text" 
                                value={licenseCode} 
                                onChange={(e) => setLicenseCode(e.target.value)}
                                placeholder="INGRESE SU CÓDIGO" 
                                className="w-full bg-black border border-slate-700 rounded-2xl p-5 text-center text-white tracking-[0.3em] mb-4 focus:border-lime-500 outline-none transition-all"
                            />
                            <button onClick={() => validateLicense(licenseCode)} className="w-full bg-lime-500 text-black font-bold py-5 rounded-2xl hover:bg-lime-400 transition-all uppercase tracking-widest">Activar</button>
                            {authError && <p className="text-red-500 text-xs mt-4">{authError}</p>}
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex flex-col h-screen max-w-4xl mx-auto bg-[#0f0f12] border-x border-slate-900 shadow-2xl">
                    <header className="flex items-center justify-between px-8 py-6 border-b border-slate-900 bg-[#16161a]/50 glass-effect">
                        <div className="flex items-center gap-4">
                            <div className="w-10 h-10 bg-lime-500/10 rounded-xl flex items-center justify-center border border-lime-500/20">
                                <i className="fas fa-shield-check text-lime-500 text-xl"></i>
                            </div>
                            <div>
                                <h1 className="text-lg font-bold text-white leading-none">PREDICADOR-PRO</h1>
                                <p className="text-[9px] font-bold text-slate-500 tracking-[0.3em] uppercase">Soli Deo Gloria</p>
                            </div>
                        </div>
                        <div className="bg-lime-500 text-black text-[10px] font-black px-4 py-1 rounded-full uppercase tracking-tighter">MODO PRO</div>
                    </header>

                    <main className="flex-1 overflow-y-auto p-6 md:p-10 space-y-10 custom-scrollbar">
                        {messages.length === 0 && (
                            <div className="h-full flex flex-col items-center justify-center opacity-10 text-center">
                                <i className="fas fa-book-open-reader text-8xl text-lime-500 mb-6"></i>
                                <h2 className="text-4xl font-black italic text-white">Estudio Teológico</h2>
                                <p className="text-slate-400 italic">"Escudriñad las Escrituras..."</p>
                            </div>
                        )}
                        {messages.map((msg, i) => (
                            <div key={i} className={`flex flex-col message-in ${msg.role === 'user' ? 'items-end' : 'items-start'}`}>
                                <div className={`p-6 md:p-8 rounded-[2rem] max-w-[90%] border shadow-lg ${msg.role === 'user' ? 'bg-lime-500 text-black font-semibold rounded-tr-none border-lime-400' : 'bg-[#1a1a20] text-slate-200 rounded-tl-none border-slate-800'}`}>
                                    {msg.role === 'user' ? <p>{msg.content}</p> : <FormattedResponse text={msg.content} />}
                                </div>
                            </div>
                        ))}
                        {isLoading && (
                            <div className="flex items-center gap-3 text-lime-500 animate-pulse font-bold text-xs uppercase tracking-widest ml-4">
                                <i className="fas fa-circle-notch animate-spin"></i>
                                <span>Analizando bajo la sana doctrina...</span>
                            </div>
                        )}
                    </main>

                    <footer className="p-6 md:p-8 border-t border-slate-900 bg-[#16161a]">
                        <div className="flex gap-4 items-center bg-[#0a0a0c] border border-slate-800 rounded-[2rem] p-2 pl-6 focus-within:border-lime-500 transition-all">
                            <textarea 
                                value={input} 
                                onChange={(e) => setInput(e.target.value)} 
                                placeholder="Pasaje o tema..." 
                                className="flex-1 bg-transparent text-white py-4 outline-none resize-none text-lg" 
                                rows="1"
                                onKeyDown={(e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } }}
                            />
                            <button onClick={startSpeech} className={`p-4 rounded-full transition-all ${isListening ? 'text-red-500 animate-bounce' : 'text-slate-500 hover:text-lime-500'}`}>
                                <i className="fas fa-microphone text-xl"></i>
                            </button>
                            <button onClick={handleSend} disabled={!input.trim() || isLoading} className="p-5 rounded-full bg-lime-500 text-black hover:scale-105 active:scale-95 transition-all">
                                <i className="fas fa-paper-plane text-xl"></i>
                            </button>
                        </div>
                        <p className="text-center text-[9px] text-slate-600 mt-4 uppercase tracking-widest">Admin: Jorge Álvarez | Paraguay 2026</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
