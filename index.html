<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PREDICADOR-PRO | Soli Deo Gloria</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Fauna+One&display=swap');

        :root {
            --gold: #d4af37;
            --dark-bg: #0f0f0f;
            --card-bg: #1a1a1a;
            --text-color: #e0e0e0;
            --accent-gold: #f1d592;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--dark-bg);
            color: var(--text-color);
            font-family: 'Fauna One', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 500px;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            border: 1px solid #2a2a2a;
            text-align: center;
            position: relative;
        }

        .header-line {
            width: 60px;
            height: 2px;
            background: var(--gold);
            margin: 10px auto 30px;
        }

        h1 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            margin: 0;
            letter-spacing: 3px;
            font-size: 26px;
        }

        .subtitle {
            font-size: 10px;
            letter-spacing: 4px;
            color: #666;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .input-group {
            text-align: left;
            margin-bottom: 25px;
        }

        label {
            font-size: 11px;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: block;
            margin-bottom: 8px;
        }

        input, textarea {
            width: 100%;
            background: #111;
            border: 1px solid #333;
            color: white;
            padding: 15px;
            box-sizing: border-box;
            border-radius: 4px;
            font-family: 'Fauna One', serif;
            font-size: 15px;
            transition: 0.3s;
        }

        input:focus, textarea:focus {
            border-color: var(--gold);
            outline: none;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.1);
        }

        .btn-gold {
            background: linear-gradient(135deg, #d4af37 0%, #b8962d 100%);
            color: black;
            border: none;
            padding: 18px;
            width: 100%;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-gold:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
            background: linear-gradient(135deg, #f1d592 0%, #d4af37 100%);
        }

        #main-app { display: none; }

        .footer {
            margin-top: 40px;
            font-size: 10px;
            color: #444;
            letter-spacing: 1px;
        }

        /* MODO PERGAMINO */
        .light-mode { background-color: #222; }
        .light-mode .container { background: #f4ecd8; border-color: #d3c4a8; }
        .light-mode h1, .light-mode label { color: #5d4037; }
        .light-mode input, .light-mode textarea { background: #fff; color: #333; border-color: #d3c4a8; }
        .light-mode .btn-gold { background: #5d4037; color: #fff; }

        .top-right { position: absolute; top: 20px; right: 20px; }
        .top-right i { color: var(--gold); cursor: pointer; opacity: 0.6; transition: 0.3s; }
        .top-right i:hover { opacity: 1; }
    </style>
</head>
<body>

<div class="container">
    <div class="top-right">
        <i class="fas fa-scroll" onclick="toggleTheme()"></i>
    </div>
    <h1>PREDICADOR-PRO</h1>
    <div class="header-line"></div>
    <div class="subtitle">Soli Deo Gloria</div>

    <div id="auth-box">
        <div class="input-group">
            <label>Código de Acceso Ministerial</label>
            <input type="text" id="license-key" placeholder="••••••••••••">
        </div>
        <button class="btn-gold" onclick="verificarLicencia()">Activar Plataforma</button>
    </div>

    <div id="main-app">
        <div class="input-group">
            <label>Consulta o Pasaje Bíblico</label>
            <textarea id="user-input" rows="5" placeholder="Dicta tu bosquejo aquí..."></textarea>
        </div>
        <button class="btn-gold" onclick="enviarConsulta()">Generar Estudio</button>
        <button onclick="startSpeech()" style="background:none; border:none; color:var(--gold); cursor:pointer; margin-top:15px; font-size:12px; text-transform:uppercase;">
            <i class="fas fa-microphone"></i> Activar Micrófono
        </button>
    </div>

    <div class="footer">
        Administración: Jorge Álvarez<br>Villa Elisa, Paraguay
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBf9xenhC3kO4vhO8EJMDnVAYm7L-S_jRU",
        authDomain: "predicador-pro.firebaseapp.com",
        projectId: "predicador-pro",
        storageBucket: "predicador-pro.appspot.com",
        messagingSenderId: "54203135548",
        appId: "1:54203135548:web:7f3b832b85a3637e96b8c8"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function verificarLicencia() {
        const key = document.getElementById('license-key').value.trim().toUpperCase();
        if(!key) return;
        const docRef = db.collection("artifacts/predicador-pro-default/public/data/licenses").doc(key);
        const doc = await docRef.get();
        if (doc.exists && doc.data().active === true) {
            document.getElementById('auth-box').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
        } else {
            alert("Acceso no autorizado.");
        }
    }

    function toggleTheme() { document.body.classList.toggle('light-mode'); }
    
    function startSpeech() {
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = 'es-PY';
        rec.start();
        rec.onresult = (e) => { document.getElementById('user-input').value = e.results[0][0].transcript; };
    }

    async function enviarConsulta() {
        alert("Consultando base doctrinal... (Procesando)");
    }
</script>
</body>
</html>
