<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente del Predicador - Chat Teológico</title>
    <!-- Tailwind CSS para el diseño profesional -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React y Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Iconos Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f0f12; color: #e2e8f0; margin: 0; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1a1a20; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ==========================================================
        // 📚 SECCIÓN DE CONOCIMIENTO (AQUÍ CARGAS TU "ORO" TEOLÓGICO)
        // ==========================================================
        const MI_BIBLIOTECA_TEOLOGICA = `
        DOCUMENTACIÓN MAESTRA CARGADA:
        
        1. Confesión de Fe de Londres de 1689 (Bautista Reformada).
        2. John Gill - "The Cause of God and Truth" (Defensa de la soberanía de Dios).
        3. Juan Calvino - Institución de la Religión Cristiana.
        4. Matthew Henry - Comentario completo.
        5. Charles Spurgeon - Estilo de bosquejos y aplicaciones.

        [COPIA Y PEGA AQUÍ TUS LIBROS O NOTAS ADICIONALES]
        `;

        const SYSTEM_PROMPT = `
        Actúa como un Asistente Teológico Reformado con 30 años de experiencia.
        
        USO DE CONOCIMIENTO: Tu base de datos principal es:
        ${MI_BIBLIOTECA_TEOLOGICA}
        
        REGLAS DOCTRINALES:
        - La Biblia es la autoridad final.
        - Teología Reformada Histórica (Confesión de 1689).
        - Estilo pastoral, serio y centrado en la gloria de Dios.
        
        PASOS PARA CADA SERMÓN:
        1. Contexto, 2. Exégesis, 3. Doctrina, 4. Evangelio, 5. Aplicación, 6. Bosquejo.
        
        CHAT: Mantén el historial. Si el usuario pide cambios o profundiza, usa el contexto previo.
        `;

        const Icon = ({ name, className }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const App = () => {
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_api_key') || '');
            const [showSettings, setShowSettings] = useState(false);
            const scrollRef = useRef(null);

            useEffect(() => {
                if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
            }, [messages, isLoading]);

            const copyText = (text) => {
                navigator.clipboard.writeText(text);
            };

            const callGemini = async (currentMessages) => {
                // Usamos gemini-1.5-flash que es el estándar más estable para llaves gratuitas
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
                const contents = currentMessages.map(m => ({
                    role: m.role === 'assistant' ? 'model' : 'user',
                    parts: [{ text: m.content }]
                }));

                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents,
                        systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] }
                    })
                });

                if (!response.ok) throw new Error('Key error');
                const data = await response.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text || "No hay respuesta.";
            };

            const handleSend = async () => {
                if (!input.trim() || isLoading) return;
                if (!apiKey) { setShowSettings(true); return; }

                const newMsgs = [...messages, { role: 'user', content: input }];
                setMessages(newMsgs);
                setInput('');
                setIsLoading(true);

                try {
                    const aiRes = await callGemini(newMsgs);
                    setMessages([...newMsgs, { role: 'assistant', content: aiRes }]);
                } catch (err) {
                    setMessages([...newMsgs, { role: 'assistant', content: "⚠️ Error: Verifica tu API KEY. Haz clic en el icono ⚙️ arriba para configurarla." }]);
                } finally {
                    setIsLoading(false);
                }
            };

            return (
                <div className="flex flex-col h-screen max-w-4xl mx-auto bg-[#0f0f12] border-x border-slate-800 shadow-2xl">
                    <header className="flex items-center justify-between px-6 py-4 bg-[#1a1a20] border-b border-slate-800">
                        <div className="flex items-center gap-3">
                            <div className="p-2 bg-lime-500/10 rounded-lg text-lime-400">
                                <Icon name="shield" className="w-6 h-6" />
                            </div>
                            <div>
                                <h1 className="text-lg font-bold text-white tracking-tight">Asistente del Predicador</h1>
                                <p className="text-[10px] text-slate-500 font-bold tracking-widest uppercase">Tradición Reformada • 1689</p>
                            </div>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => setShowSettings(true)} className="p-2 hover:bg-slate-800 rounded-lg text-slate-400" title="Ajustes"><Icon name="settings" className="w-5 h-5" /></button>
                            <button onClick={() => { if(confirm("¿Deseas limpiar el estudio actual?")) setMessages([]); }} className="p-2 hover:bg-slate-800 rounded-lg text-slate-400" title="Reiniciar"><Icon name="refresh-cw" className="w-5 h-5" /></button>
                        </div>
                    </header>

                    <main ref={scrollRef} className="flex-1 overflow-y-auto p-4 md:p-6 space-y-6">
                        {messages.length === 0 && (
                            <div className="flex flex-col items-center justify-center h-full text-center space-y-4 opacity-40">
                                <div className="p-6 bg-slate-800/30 rounded-full">
                                    <Icon name="book-open" className="w-16 h-16 text-lime-500" />
                                </div>
                                <h2 className="text-2xl font-bold text-white tracking-widest">SOLI DEO GLORIA</h2>
                                <p className="text-sm max-w-xs mx-auto italic leading-relaxed">
                                    Prepara tu sermón con la ayuda de la sana doctrina. Ingresa un pasaje bíblico para comenzar.
                                </p>
                            </div>
                        )}
                        {messages.map((msg, i) => (
                            <div key={i} className={`flex flex-col ${msg.role === 'user' ? 'items-end' : 'items-start'}`}>
                                <div className={`p-4 rounded-2xl max-w-[90%] md:max-w-[85%] whitespace-pre-wrap leading-relaxed shadow-lg ${
                                    msg.role === 'user' ? 'bg-blue-700 text-white rounded-tr-none' : 'bg-[#1a1a20] border border-slate-800 text-slate-200 rounded-tl-none'
                                }`}>
                                    {msg.content}
                                </div>
                                {msg.role === 'assistant' && (
                                    <button onClick={() => copyText(msg.content)} className="mt-2 text-[10px] font-bold text-slate-500 hover:text-lime-500 flex items-center gap-1 ml-2 transition-colors">
                                        <Icon name="copy" className="w-3 h-3" /> COPIAR CONTENIDO
                                    </button>
                                )}
                            </div>
                        ))}
                        {isLoading && (
                            <div className="flex gap-3 items-center text-slate-500 text-sm italic animate-pulse">
                                <Icon name="loader-2" className="w-4 h-4 animate-spin text-lime-500" />
                                Analizando las Escrituras...
                            </div>
                        )}
                    </main>

                    <footer className="p-6 bg-[#1a1a20] border-t border-slate-800">
                        <div className="flex gap-2 max-w-3xl mx-auto relative">
                            <textarea
                                value={input}
                                onChange={(e) => setInput(e.target.value)}
                                onKeyDown={(e) => e.key === 'Enter' && !e.shiftKey && (e.preventDefault(), handleSend())}
                                placeholder="Ingresa un pasaje o haz una pregunta..."
                                className="w-full bg-[#0b0b0d] text-white border border-slate-700 rounded-xl px-4 py-3 outline-none focus:border-lime-500 transition-all resize-none shadow-inner"
                                rows="1"
                            />
                            <button onClick={handleSend} className="bg-lime-500 hover:bg-lime-400 text-black px-5 rounded-xl shadow-lg active:scale-95 transition-all flex items-center justify-center">
                                <Icon name="send" className="w-5 h-5" />
                            </button>
                        </div>
                    </footer>

                    {/* Modal de Configuración */}
                    {showSettings && (
                        <div className="fixed inset-0 bg-black/95 flex items-center justify-center p-4 z-50 backdrop-blur-md">
                            <div className="bg-[#1a1a20] p-8 rounded-3xl border border-slate-800 max-w-sm w-full space-y-6 shadow-2xl">
                                <div className="flex items-center gap-3 text-white">
                                    <Icon name="key" className="w-6 h-6 text-lime-400" />
                                    <h3 className="text-xl font-bold">Activa tu Asistente</h3>
                                </div>
                                <p className="text-sm text-slate-400 leading-relaxed">
                                    Introduce tu API Key de Google Gemini. Tus datos se guardan de forma segura en tu navegador y no se comparten.
                                </p>
                                <input 
                                    type="password" 
                                    value={apiKey} 
                                    onChange={(e) => setApiKey(e.target.value)}
                                    placeholder="API Key de Google..."
                                    className="w-full bg-[#0b0b0d] border border-slate-700 p-4 rounded-xl text-white outline-none focus:border-lime-400 transition-all"
                                />
                                <div className="flex gap-3">
                                    <button onClick={() => { localStorage.setItem('gemini_api_key', apiKey); setShowSettings(false); }} className="flex-1 bg-lime-500 text-black py-3 rounded-xl font-bold hover:bg-lime-400 transition-all shadow-lg shadow-lime-500/20">Guardar</button>
                                    <button onClick={() => setShowSettings(false)} className="flex-1 bg-slate-800 text-white py-3 rounded-xl hover:bg-slate-700 transition-all">Cerrar</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
