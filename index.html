<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PREDICADOR-PRO | Acceso Ministerial</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --dark-bg: #1a1a1a;
            --card-bg: #242424;
            --text-main: #e0e0e0;
            --parchment: #f4ecd8;
        }
        body { 
            font-family: 'Times New Roman', Times, serif; 
            background-color: var(--dark-bg); 
            color: var(--text-main); 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
        }
        .app-card {
            background: var(--card-bg);
            width: 90%;
            max-width: 500px;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #333;
            text-align: center;
        }
        h1 { color: var(--gold); letter-spacing: 2px; margin-bottom: 5px; font-size: 24px; }
        .subtitle { font-style: italic; color: #888; font-size: 14px; margin-bottom: 30px; }
        
        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; color: var(--gold); margin-bottom: 8px; font-size: 12px; text-transform: uppercase; }
        input, textarea {
            width: 100%;
            padding: 12px;
            background: #111;
            border: 1px solid #444;
            color: white;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: 'Georgia', serif;
        }
        button {
            width: 100%;
            padding: 15px;
            background: var(--gold);
            color: black;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }
        button:hover { background: #b8962d; transform: translateY(-2px); }
        #chat-area { display: none; margin-top: 20px; }
        .footer-logo { margin-top: 30px; font-size: 12px; color: #555; }
        
        /* MODO PERGAMINO */
        .light-mode { background-color: #ddd; color: #1a1a1a; }
        .light-mode .app-card { background: var(--parchment); border: 1px solid #c4b494; }
        .light-mode h1, .light-mode label { color: #8b4513; }
        .light-mode input, .light-mode textarea { background: white; color: black; border: 1px solid #c4b494; }
    </style>
</head>
<body>

<div class="app-card">
    <div style="text-align: right;">
        <i class="fas fa-scroll" onclick="toggleTheme()" style="cursor:pointer; color:var(--gold);"></i>
    </div>
    <h1>PREDICADOR-PRO</h1>
    <div class="subtitle">Soli Deo Gloria</div>

    <div id="auth-box">
        <div class="input-group">
            <label>Código de Suscripción</label>
            <input type="text" id="license-key" placeholder="Ej: JORGE-PRO-2025">
        </div>
        <button onclick="verificarLicencia()">Activar Acceso Ministerial</button>
    </div>

    <div id="chat-area">
        <div class="input-group">
            <label>Consulta Teológica / Pasaje</label>
            <textarea id="user-input" rows="4" placeholder="Dicta tu idea aquí..."></textarea>
        </div>
        <button onclick="enviarConsulta()"><i class="fas fa-feather-alt"></i> Generar Bosquejo</button>
        <p id="status-msg" style="font-size: 12px; margin-top: 10px; color: var(--gold);"></p>
    </div>

    <div class="footer-logo">Administrado por Jorge Álvarez<br>Villa Elisa, Paraguay</div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBf9xenhC3kO4vhO8EJMDnVAYm7L-S_jRU",
        authDomain: "predicador-pro.firebaseapp.com",
        projectId: "predicador-pro",
        storageBucket: "predicador-pro.appspot.com",
        messagingSenderId: "54203135548",
        appId: "1:54203135548:web:7f3b832b85a3637e96b8c8"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function verificarLicencia() {
        const key = document.getElementById('license-key').value.trim().toUpperCase();
        const docRef = db.collection("artifacts/predicador-pro-default/public/data/licenses").doc(key);
        const doc = await docRef.get();
        
        if (doc.exists && doc.data().active === true) {
            document.getElementById('auth-box').style.display = 'none';
            document.getElementById('chat-area').style.display = 'block';
        } else {
            alert("Acceso denegado. Contacte al administrador.");
        }
    }

    async function obtenerSabiduriaBerkhof() {
        try {
            const docRef = db.collection("artifacts/predicador-pro-default/public/data/biblioteca").doc("BERKHOF");
            const doc = await docRef.get();
            return doc.exists ? JSON.stringify(doc.data()) : "";
        } catch (e) { return ""; }
    }

    async function enviarConsulta() {
        const msg = document.getElementById('status-msg');
        msg.innerText = "Consultando biblioteca de Berkhof...";
        const sabiduria = await obtenerSabiduriaBerkhof();
        
        // Simulación por ahora, pero ya cargando el contexto
        setTimeout(() => {
            msg.innerText = "Estudio generado con éxito basándose en Berkhof.";
            alert("¡Listo! El asistente ha procesado tu consulta usando la Teología de Berkhof.");
        }, 1500);
    }

    function toggleTheme() {
        document.body.classList.toggle('light-mode');
    }
</script>
</body>
</html>
