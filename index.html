<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PREDICADOR-PRO | Soli Deo Gloria</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #0f0f0f; --card: #1a1a1a; --text: #f0f0f0; --parchment: #f4ecd8; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: 'Georgia', serif; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        
        #auth-screen { text-align: center; width: 100%; max-width: 400px; padding: 20px; }
        .logo-title { font-size: 28px; color: var(--gold); letter-spacing: 5px; margin-bottom: 30px; text-transform: uppercase; }

        #main-app { display: none; width: 100vw; height: 100vh; flex-direction: column; align-items: center; justify-content: center; position: relative; background: radial-gradient(circle, #1e1e1e 0%, #0a0a0a 100%); }
        .bible-icon { font-size: 110px; color: #d3c4a8; margin-bottom: 20px; filter: drop-shadow(0 0 15px rgba(212,175,55,0.2)); }
        
        .workspace { width: 90%; max-width: 800px; text-align: center; }
        .input-area { background: rgba(255,255,255,0.03); border: 1px solid #333; border-radius: 8px; padding: 15px; margin-top: 20px; }
        textarea { width: 100%; height: 110px; background: transparent; border: none; color: #fff; font-size: 18px; font-family: 'Georgia', serif; resize: none; outline: none; }
        
        #progress-bar-container { width: 100%; height: 3px; background: #222; margin: 15px 0; display: none; }
        #progress-bar { width: 0%; height: 100%; background: var(--gold); transition: 0.4s; }

        .btn-gold { background: var(--gold); color: #000; border: none; padding: 15px 45px; border-radius: 4px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }
        .btn-gold:hover { background: #fff; transform: translateY(-2px); }

        #output-scroll { display: none; margin-top: 25px; padding: 30px; background: #161616; border-left: 3px solid var(--gold); text-align: left; max-height: 350px; overflow-y: auto; font-style: italic; line-height: 1.8; border-radius: 0 8px 8px 0; box-shadow: inset 0 0 20px #000; }

        .nav-tools { position: absolute; top: 30px; right: 40px; display: flex; gap: 25px; color: var(--gold); font-size: 22px; cursor: pointer; }
        
        .light-mode #main-app { background: var(--parchment); color: #2c2c2c; }
        .light-mode .input-area, .light-mode #output-scroll { background: #fff; border-color: #d3c4a8; color: #111; }
        .light-mode textarea { color: #000; }
        .light-mode .bible-icon { color: #8b4513; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="logo-title">PREDICADOR-PRO</div>
        <input type="text" id="license-key" placeholder="CÓDIGO DE ACCESO" style="width:100%; padding:15px; margin-bottom:20px; background:#000; border:1px solid #333; color:#fff; text-align:center; font-size: 18px;">
        <button class="btn-gold" onclick="verificarLicencia()" style="width:100%">ACTIVAR MINISTERIO</button>
    </div>

    <div id="main-app">
        <div class="nav-tools">
            <i class="fas fa-moon" title="Modo Oscuro" onclick="setTheme('dark')"></i>
            <i class="fas fa-scroll" title="Modo Pergamino" onclick="setTheme('light')"></i>
        </div>

        <div class="workspace">
            <div class="bible-icon"><i class="fas fa-book-open"></i></div>
            <h2 style="font-weight:lighter; letter-spacing:4px; margin-bottom: 5px;">ESTUDIO EXEGÉTICO</h2>
            <p style="font-size: 11px; color: #666; letter-spacing: 2px; text-transform: uppercase;">Soli Deo Gloria</p>
            
            <div class="input-area">
                <textarea id="user-input" placeholder="Dicta o escribe el pasaje o tema doctrinal aquí..."></textarea>
                <div style="display:flex; justify-content: space-between; align-items:center; border-top:1px solid #222; padding-top:12px;">
                    <i class="fas fa-microphone" style="color:var(--gold); cursor:pointer; font-size: 20px;" onclick="startSpeech()"></i>
                    <button class="btn-gold" onclick="ejecutarIA()">GENERAR BOSQUEJO</button>
                </div>
            </div>

            <div id="progress-bar-container"><div id="progress-bar"></div></div>
            <p id="status-text" style="font-size:12px; color:var(--gold); font-style: italic; margin-top: 10px;"></p>

            <div id="output-scroll"></div>
        </div>
        
        <div style="position: absolute; bottom: 30px; font-size: 10px; color: #444; letter-spacing: 1px;">
            DISEÑO Y ADMINISTRACIÓN: JORGE ÁLVAREZ | VILLA ELISA, PY
        </div>
    </div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBf9xenhC3kO4vhO8EJMDnVAYm7L-S_jRU", authDomain: "predicador-pro.firebaseapp.com", projectId: "predicador-pro", storageBucket: "predicador-pro.appspot.com", messagingSenderId: "54203135548", appId: "1:54203135548:web:7f3b832b85a3637e96b8c8" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const SYSTEM_PROMPT = `Eres PREDICADOR-PRO, un asistente teológico reformado de alto nivel académico. 
    Tu marco doctrinal es la Confesión de Fe de Londres de 1689. 
    Instrucciones: Provee bosquejos exegéticos profundos, analizando el contexto histórico y el griego/hebreo original. 
    Usa un lenguaje solemne y profesional.`;

    async function verificarLicencia() {
        const key = document.getElementById('license-key').value.trim().toUpperCase();
        if(!key) return;
        const doc = await db.collection("artifacts/predicador-pro-default/public/data/licenses").doc(key).get();
        if (doc.exists && doc.data().active) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
        } else { alert("Acceso Denegado. Consulte al Administrador."); }
    }

    function setTheme(mode) {
        if(mode === 'light') document.body.classList.add('light-mode');
        else document.body.classList.remove('light-mode');
    }

    async function ejecutarIA() {
        const bar = document.getElementById('progress-bar');
        const container = document.getElementById('progress-bar-container');
        const status = document.getElementById('status-text');
        const output = document.getElementById('output-scroll');
        const query = document.getElementById('user-input').value;

        if(!query) return;

        container.style.display = 'block';
        output.style.display = 'none';
        
        let p = 0;
        const msgs = ["Consultando Biblioteca de Berkhof...", "Analizando exégesis bíblica...", "Estructurando bajo la Confesión de 1689...", "Redactando bosquejo final..."];
        
        const interval = setInterval(() => {
            p += 2;
            bar.style.width = p + "%";
            status.innerText = msgs[Math.floor(p/26)] || "Finalizando...";
            
            if(p >= 100) {
                clearInterval(interval);
                status.innerText = "Análisis completado.";
                container.style.display = 'none';
                output.style.display = 'block';
                // AQUÍ SE MOSTRARÁ EL RESULTADO REAL BASADO EN EL PROMPT
                output.innerHTML = `<strong>RESULTADO TEOLÓGICO:</strong><br><br>Basado en el rigor exegético solicitado para "${query}", se ha estructurado un análisis profundo que integra la doctrina de la soberanía divina y el contexto histórico gramatical. <br><br> [El contenido completo aparecerá aquí al conectar la API Key]`;
            }
        }, 100);
    }

    function startSpeech() {
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = 'es-PY'; rec.start();
        rec.onresult = (e) => { document.getElementById('user-input').value = e.results[0][0].transcript; };
    }
</script>
</body>
</html>
