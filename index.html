<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente del Predicador v9.0</title>
    <!-- Herramientas de diseño -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f0f12; color: #e2e8f0; margin: 0; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1a1a20; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // =========================================================================
        // 📚 SECCIÓN DE CONOCIMIENTO (JORGE: PEGA TUS LIBROS AQUÍ)
        // =========================================================================
        const MI_BIBLIOTECA_TEOLOGICA = `
        BASE DE DATOS PROPIA DE JORGE ÁLVAREZ:
        1. Confesión de Fe de Londres de 1689.
        2. John Gill - "The Cause of God and Truth".
        3. Comentarios de Matthew Henry y Juan Calvino.
        4. Obras de Charles Spurgeon y Martyn Lloyd-Jones.
        `;

        const SYSTEM_PROMPT = `Actúa como un Asistente Teológico Reformado con 30 años de experiencia. 
        FUENTES: ${MI_BIBLIOTECA_TEOLOGICA}. 
        MARCO DOCTRINAL: Biblia como autoridad suprema, Confesión de 1689. 
        PROCESO: Contexto, Exégesis, Doctrina, Evangelio, Aplicación, Bosquejo. 
        IMPORTANTE: Responde siempre en español. No pierdas el hilo de la conversación.`;

        const Icon = ({ name, className }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const App = () => {
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_api_key') || '');
            const [showSettings, setShowSettings] = useState(false);
            const scrollRef = useRef(null);

            useEffect(() => {
                if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
            }, [messages, isLoading]);

            const saveKey = (key) => {
                const cleanKey = key.trim().replace(/["']/g, ""); 
                setApiKey(cleanKey);
                localStorage.setItem('gemini_api_key', cleanKey);
                setShowSettings(false);
                alert("Llave configurada. Intenta iniciar el estudio ahora.");
            };

            const callGemini = async (currentMessages) => {
                // MÉTODO 1: v1 Estable con systemInstruction
                try {
                    const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
                    const payload = {
                        contents: currentMessages.map(m => ({
                            role: m.role === 'assistant' ? 'model' : 'user',
                            parts: [{ text: m.content }]
                        })),
                        systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] }
                    };

                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (response.ok) {
                        const data = await response.json();
                        return data.candidates?.[0]?.content?.parts?.[0]?.text;
                    }
                } catch (e) { console.log("Método 1 falló"); }

                // MÉTODO 2: v1 Estable con inyección de primer mensaje (Respaldo)
                try {
                    const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
                    const contents = [
                        { role: 'user', parts: [{ text: `INSTRUCCIONES: ${SYSTEM_PROMPT}. Entendido?` }] },
                        { role: 'model', parts: [{ text: "Entendido. Soy su asistente teológico reformado. ¿Qué pasaje estudiaremos?" }] },
                        ...currentMessages.map(m => ({
                            role: m.role === 'assistant' ? 'model' : 'user',
                            parts: [{ text: m.content }]
                        }))
                    ];

                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents })
                    });

                    if (response.ok) {
                        const data = await response.json();
                        return data.candidates?.[0]?.content?.parts?.[0]?.text;
                    }
                } catch (e) { console.log("Método 2 falló"); }

                throw new Error("No se pudo conectar con el motor de Google. Verifica tu API Key.");
            };

            const handleSend = async () => {
                if (!input.trim() || isLoading) return;
                if (!apiKey) { setShowSettings(true); return; }

                const newMsgs = [...messages, { role: 'user', content: input }];
                setMessages(newMsgs);
                setInput('');
                setIsLoading(true);

                try {
                    const aiRes = await callGemini(newMsgs);
                    if (aiRes) {
                        setMessages([...newMsgs, { role: 'assistant', content: aiRes }]);
                    } else {
                        throw new Error("Respuesta vacía de Google.");
                    }
                } catch (err) {
                    setMessages([...newMsgs, { role: 'assistant', content: `❌ ERROR: ${err.message}. Asegúrate de que la API Key en el icono ⚙️ sea la que copiaste de Google.` }]);
                } finally {
                    setIsLoading(false);
                }
            };

            return (
                <div className="flex flex-col h-screen max-w-4xl mx-auto bg-[#0f0f12] border-x border-slate-800 shadow-2xl overflow-hidden text-slate-200">
                    <header className="flex items-center justify-between px-6 py-4 bg-[#1a1a20] border-b border-slate-800 shrink-0 shadow-lg">
                        <div className="flex items-center gap-3">
                            <div className="p-2 bg-lime-500/10 rounded-lg text-lime-400 border border-lime-500/20 shadow-[0_0_15px_rgba(132,204,22,0.1)]">
                                <Icon name="shield" className="w-6 h-6" />
                            </div>
                            <div>
                                <h1 className="text-lg font-bold text-white tracking-tight">Asistente Predicador <span className="text-lime-500 text-xs ml-1 font-mono uppercase">v9.0</span></h1>
                                <p className="text-[10px] text-slate-500 font-bold tracking-widest uppercase text-xs md:text-sm">Tradición Reformada • 1689</p>
                            </div>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => setShowSettings(true)} className="p-2 hover:bg-slate-800 rounded-lg text-slate-400 transition-colors">
                                <Icon name="settings" className="w-5 h-5" />
                            </button>
                            <button onClick={() => setMessages([])} className="p-2 hover:bg-slate-800 rounded-lg text-slate-400 transition-colors">
                                <Icon name="refresh-cw" className="w-5 h-5" />
                            </button>
                        </div>
                    </header>

                    <main ref={scrollRef} className="flex-1 overflow-y-auto p-4 md:p-8 space-y-6 bg-[#0f0f12]">
                        {messages.length === 0 && (
                            <div className="flex flex-col items-center justify-center h-full text-center space-y-6 opacity-40">
                                <div className="p-6 bg-slate-800/30 rounded-full border border-lime-500/20 shadow-lg">
                                    <Icon name="book-open" className="w-16 h-16 text-lime-500" />
                                </div>
                                <div className="space-y-2">
                                    <h2 className="text-xl font-bold text-white tracking-widest uppercase text-sm md:text-xl">SOLI DEO GLORIA</h2>
                                    <p className="text-sm max-w-xs mx-auto italic text-slate-400 leading-relaxed text-xs md:text-sm">
                                        Versión 9.0 (Estable). Ingrese un pasaje para comenzar su estudio bíblico.
                                    </p>
                                </div>
                            </div>
                        )}
                        {messages.map((msg, i) => (
                            <div key={i} className={`flex flex-col ${msg.role === 'user' ? 'items-end' : 'items-start'}`}>
                                <div className={`p-4 rounded-2xl max-w-[95%] md:max-w-[85%] whitespace-pre-wrap leading-relaxed shadow-lg text-sm md:text-base ${
                                    msg.role === 'user' ? 'bg-blue-700 text-white rounded-tr-none' : 'bg-[#1a1a20] border border-slate-800 text-slate-200 rounded-tl-none'
                                }`}>
                                    {msg.content}
                                </div>
                                {msg.role === 'assistant' && !msg.content.startsWith('❌') && (
                                    <button 
                                        onClick={() => { navigator.clipboard.writeText(msg.content); alert("Copiado."); }} 
                                        className="mt-2 text-[10px] font-bold text-slate-500 hover:text-lime-500 flex items-center gap-1 ml-2 transition-colors uppercase bg-slate-800/40 px-2 py-1 rounded"
                                    >
                                        <Icon name="copy" className="w-3 h-3" /> Copiar Bosquejo
                                    </button>
                                )}
                            </div>
                        ))}
                        {isLoading && (
                            <div className="flex gap-3 items-center text-slate-500 text-sm italic animate-pulse px-2">
                                <Icon name="loader-2" className="w-4 h-4 animate-spin text-lime-500" />
                                Escudriñando las Escrituras...
                            </div>
                        )}
                    </main>

                    <footer className="p-4 md:p-6 bg-[#1a1a20] border-t border-slate-800 shadow-[0_-4px_20px_rgba(0,0,0,0.5)]">
                        <div className="flex gap-2 max-w-3xl mx-auto relative">
                            <textarea
                                value={input}
                                onChange={(e) => setInput(e.target.value)}
                                onKeyDown={(e) => e.key === 'Enter' && !e.shiftKey && (e.preventDefault(), handleSend())}
                                placeholder="Escribe el pasaje o una pregunta..."
                                className="w-full bg-[#0b0b0d] text-white border border-slate-700 rounded-xl px-4 py-3 outline-none focus:border-lime-500 transition-all resize-none shadow-inner text-sm md:text-base"
                                rows="1"
                            />
                            <button onClick={handleSend} className="bg-lime-500 hover:bg-lime-400 text-black px-5 rounded-xl flex items-center justify-center shadow-lg active:scale-95 transition-all">
                                <Icon name="send" className="w-5 h-5" />
                            </button>
                        </div>
                    </footer>

                    {showSettings && (
                        <div className="fixed inset-0 bg-black/95 flex items-center justify-center p-4 z-50 backdrop-blur-sm">
                            <div className="bg-[#1a1a20] p-8 rounded-3xl border border-slate-800 max-w-sm w-full space-y-6 shadow-2xl text-center">
                                <Icon name="key" className="w-12 h-12 text-lime-400 mx-auto" />
                                <h3 className="text-xl font-bold text-white uppercase tracking-tighter">Activar Motor IA</h3>
                                <p className="text-xs text-slate-400 leading-relaxed">
                                    Introduce la clave que copiaste de Google AI Studio. Esta versión 9.0 limpia espacios automáticamente.
                                </p>
                                <input 
                                    type="password" 
                                    value={apiKey} 
                                    onChange={(e) => setApiKey(e.target.value)}
                                    placeholder="AIzaSy..."
                                    className="w-full bg-[#0b0b0d] border border-slate-700 p-4 rounded-xl text-white outline-none focus:border-lime-400 text-center font-mono text-xs"
                                />
                                <div className="flex gap-3 pt-2">
                                    <button onClick={() => saveKey(apiKey)} className="flex-1 bg-lime-500 text-black py-3 rounded-xl font-bold hover:bg-lime-400 transition-all shadow-lg shadow-lime-500/20">Guardar</button>
                                    <button onClick={() => setShowSettings(false)} className="flex-1 bg-slate-800 text-white py-3 rounded-xl hover:bg-slate-700">Cerrar</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
