<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PREDICADOR-PRO | Diagnóstico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
        
        const config = {
          apiKey: "AIzaSyC3tAC8y7E1SfnTWi08fwq7gMXP_mnmpfw", 
          authDomain: "predicador-pro.firebaseapp.com",
          projectId: "predicador-pro",
          appId: "1:145970938733:web:357aa4d0523d2892891064"
        };
        const app = initializeApp(config);
        window.PredicadorDB = { db: getFirestore(app), auth: getAuth(app), doc, getDoc, signInAnonymously, ready: true };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Crimson+Pro:wght@400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f0f12; color: #f8fafc; margin: 0; }
        .theological-text { font-family: 'Crimson Pro', serif; font-size: 1.25rem; line-height: 1.8; }
        .card { background-color: #1a1a20; border: 1px solid #334155; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [license, setLicense] = useState(localStorage.getItem('predicador_license') || '');
            const [apiKey, setApiKey] = useState(null);
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);

            const handleLogin = async () => {
                if (!license) return;
                try {
                    await window.PredicadorDB.signInAnonymously(window.PredicadorDB.auth);
                    const { db, doc, getDoc } = window.PredicadorDB;
                    const docRef = doc(db, 'artifacts', 'predicador-pro-default', 'public', 'data', 'licenses', license.trim().toUpperCase());
                    const snap = await getDoc(docRef);
                    if (snap.exists() && snap.data().active) {
                        // Buscamos apiKey o apikey para evitar errores de escritura
                        const key = snap.data().apiKey || snap.data().apikey;
                        setApiKey(key);
                        setIsLoggedIn(true);
                        localStorage.setItem('predicador_license', license.toUpperCase());
                    } else { alert("Licencia no válida"); }
                } catch (err) { alert("Error Firebase: " + err.message); }
            };

            useEffect(() => { if (license) handleLogin(); }, []);

            const handleSend = async () => {
                if (!input.trim() || loading) return;
                setMessages(prev => [...prev, { role: 'user', content: input }]);
                setInput('');
                setLoading(true);

                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: "Analiza teológicamente: " + input }] }] })
                    });
                    const data = await res.json();
                    
                    if (data.error) {
                        throw new Error(`Código ${data.error.code}: ${data.error.message}`);
                    }
                    
                    const text = data.candidates[0].content.parts[0].text;
                    setMessages(prev => [...prev, { role: 'assistant', content: text }]);
                } catch (e) {
                    setMessages(prev => [...prev, { role: 'assistant', content: "⚠️ ERROR DE GOOGLE: " + e.message }]);
                } finally { setLoading(false); }
            };

            if (!isLoggedIn) {
                return (
                    <div className="flex items-center justify-center h-screen">
                        <div className="card p-10 rounded-[2rem] text-center max-w-md w-full">
                            <i className="fas fa-key text-lime-500 text-4xl mb-4"></i>
                            <h2 className="text-xl font-bold mb-6 tracking-widest uppercase">Validación Pro</h2>
                            <input type="text" value={license} onChange={(e) => setLicense(e.target.value)} placeholder="CÓDIGO" className="w-full bg-black border border-slate-700 rounded-xl p-4 text-center text-white mb-4 outline-none focus:border-lime-500" />
                            <button onClick={handleLogin} className="w-full bg-lime-500 text-black font-bold py-4 rounded-xl hover:bg-lime-400 uppercase">Entrar</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex flex-col h-screen max-w-4xl mx-auto border-x border-slate-800">
                    <header className="flex items-center justify-between px-8 py-5 border-b border-slate-800 bg-black/40 backdrop-blur-md">
                        <div className="flex items-center gap-3">
                            <i className="fas fa-shield-check text-lime-500"></i>
                            <h1 className="font-bold">PREDICADOR-PRO</h1>
                        </div>
                        <div className="bg-lime-500 text-black text-[10px] font-black px-3 py-1 rounded-full uppercase">Conectado</div>
                    </header>
                    <main className="flex-1 overflow-y-auto p-6 md:p-10 space-y-8">
                        {messages.map((msg, i) => (
                            <div key={i} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                <div className={`p-6 rounded-[1.5rem] max-w-[90%] border ${msg.role === 'user' ? 'bg-lime-500 text-black font-bold border-lime-400' : 'card'}`}>
                                    <div className="theological-text whitespace-pre-wrap">{msg.content}</div>
                                </div>
                            </div>
                        ))}
                        {loading && <div className="text-lime-500 animate-pulse text-xs font-bold tracking-widest"><i className="fas fa-spinner fa-spin mr-2"></i>ESTUDIANDO...</div>}
                    </main>
                    <footer className="p-6 border-t border-slate-800">
                        <div className="flex gap-4 items-center bg-black/40 border border-slate-700 rounded-[2rem] p-2 pl-6">
                            <textarea value={input} onChange={(e) => setInput(e.target.value)} placeholder="Pasaje..." className="flex-1 bg-transparent text-white border-none p-3 outline-none resize-none" rows="1" onKeyDown={(e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } }} />
                            <button onClick={handleSend} className="bg-lime-500 text-black p-5 rounded-full hover:scale-105 active:scale-95 transition-all shadow-lg"><i className="fas fa-paper-plane"></i></button>
                        </div>
                    </footer>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
